id: grammar-articles-013
title: "Articles in Technical Writing"
difficulty: 1
tags: [articles, a-an, technical]
description: |
  Technical writing is full of article traps. Fix the article errors below.

  ORIGINAL: "We deployed a API to an AWS region. The app uses a OAuth flow and an URL shortener. It was an major upgrade."

  Type the corrected sentence below.
starter_code: "We deployed a API to an AWS region. The app uses a OAuth flow and an URL shortener. It was an major upgrade."
hints:
  - "'API' is pronounced 'ay-pee-eye' — starts with vowel sound → 'an API'"
  - "'AWS' is pronounced 'ay-double-u-es' — starts with vowel sound → 'an AWS'"
  - "'OAuth' starts with 'oh' (vowel sound) → 'an OAuth'"
  - "'URL' is pronounced 'you-ar-el' — starts with vowel sound → 'a URL' (sounds like consonant 'y')"
  - "'major' starts with 'm' (consonant) → 'a major'"
solution: "We deployed an API to an AWS region. The app uses an OAuth flow and a URL shortener. It was a major upgrade."
