id: grammar-api-docs-039
title: "API Documentation"
difficulty: 3
tags: [code-docs, api, advanced]
description: |
  This API endpoint documentation has errors. Public API docs must be flawless.

  ORIGINAL: "this endpoint creates an user account. it it requires an valid email and a password. the the response includes an JWT token. you shouldnt store the token in local storage."

  Type the corrected version.
starter_code: "this endpoint creates an user account. it it requires an valid email and a password. the the response includes an JWT token. you shouldnt store the token in local storage."
hints:
  - "'this' → 'This'"
  - "'an user' → 'a user' (consonant sound)"
  - "'it it' → 'It' (duplicate + capitalize)"
  - "'an valid' → 'a valid' (consonant sound)"
  - "'the the' → 'The' (duplicate + capitalize)"
  - "'an JWT' → 'a JWT' ('J' is pronounced 'jay' — consonant sound)"
  - "'shouldnt' → 'shouldn't'"
solution: "This endpoint creates a user account. It requires a valid email and a password. The response includes a JWT token. You shouldn't store the token in local storage."
