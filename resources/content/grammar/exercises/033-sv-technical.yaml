id: grammar-sv-033
title: "Subject-Verb: Technical Descriptions"
difficulty: 3
tags: [subject-verb, agreement, technical]
description: |
  Subject-verb agreement rule: the verb matches the subject (not nearby words).
  "The list of errors IS long" — 'list' is the subject, not 'errors'.
  Fix subject-verb AND other grammar errors below.

  ORIGINAL: "the list of endpoints are documented. each of the services need an update. the team are shipping an new feature. we cant wait."

  Type the corrected version.
starter_code: "the list of endpoints are documented. each of the services need an update. the team are shipping an new feature. we cant wait."
hints:
  - "'the list' (singular) → 'is documented'"
  - "'each' is always singular → 'needs an update'"
  - "'an new' → 'a new' (consonant sound)"
  - "'the team' (collective, singular in US English) → 'is shipping'"
  - "'cant' → 'can't'"
  - "'the' → 'The' (first word)"
solution: "The list of endpoints is documented. Each of the services needs an update. The team is shipping a new feature. We can't wait."
