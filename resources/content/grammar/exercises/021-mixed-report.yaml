id: grammar-mixed-021
title: "Mixed Errors: Status Report"
difficulty: 2
tags: [mixed, report, professional]
description: |
  This weekly status report has several grammar errors. Fix them all.

  ORIGINAL: "the team team completed an SQL migration. we didnt hit any blockers. next week well tackle a authentication refactor and an new dashboard."

  Type the corrected version.
starter_code: "the team team completed an SQL migration. we didnt hit any blockers. next week well tackle a authentication refactor and an new dashboard."
hints:
  - "'the' → 'The' (capitalize first word)"
  - "'team team' → 'team' (duplicate word)"
  - "'we didnt' → 'We didn't' (new sentence)"
  - "'well' as contraction → 'we'll'"
  - "'a authentication' → 'an authentication' (vowel sound)"
  - "'an new' → 'a new' (consonant sound)"
solution: "The team completed an SQL migration. We didn't hit any blockers. Next week we'll tackle an authentication refactor and a new dashboard."
