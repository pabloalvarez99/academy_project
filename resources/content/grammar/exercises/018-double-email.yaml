id: grammar-double-018
title: "Duplicate Words in an Email"
difficulty: 1
tags: [double-words, email]
description: |
  This email draft has duplicate words (written twice in a row). Find and remove them.

  ORIGINAL: "Hi team, the the deployment is scheduled for Friday. Please make sure your your changes are merged. We dont want any any surprises."

  Type the corrected version.
starter_code: "Hi team, the the deployment is scheduled for Friday. Please make sure your your changes are merged. We dont want any any surprises."
hints:
  - "Look for consecutive identical words"
  - "'the the' → 'the'"
  - "'your your' → 'your'"
  - "'any any' → 'any'"
  - "'dont' also needs an apostrophe: 'don't'"
solution: "Hi team, the deployment is scheduled for Friday. Please make sure your changes are merged. We don't want any surprises."
