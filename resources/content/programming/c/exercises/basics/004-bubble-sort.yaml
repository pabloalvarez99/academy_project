id: c-basics-004
title: "Bubble Sort"
difficulty: 2
tags: [sorting, arrays, bubble-sort]
description: |
  Read N integers and print them sorted in ascending order, space-separated.

  Example:
    Input:  5\n3 1 4 1 5
    Output: 1 1 3 4 5
starter_code: |
  #include <stdio.h>

  void bubbleSort(int arr[], int n) {
      // implement bubble sort
  }

  int main() {
      int n;
      scanf("%d", &n);
      int arr[1000];
      for (int i = 0; i < n; i++) scanf("%d", &arr[i]);
      bubbleSort(arr, n);
      for (int i = 0; i < n; i++) {
          if (i > 0) printf(" ");
          printf("%d", arr[i]);
      }
      printf("\n");
      return 0;
  }
test_cases:
  - input: "5\n3 1 4 1 5\n"
    expected_output: "1 1 3 4 5\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "3\n9 2 7\n"
    expected_output: "2 7 9\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "1\n42\n"
    expected_output: "42\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
hints:
  - "Outer loop: i from 0 to n-1"
  - "Inner loop: j from 0 to n-i-2"
  - "If arr[j] > arr[j+1], swap them"
solution: |
  #include <stdio.h>

  void bubbleSort(int arr[], int n) {
      for (int i = 0; i < n - 1; i++) {
          for (int j = 0; j < n - i - 1; j++) {
              if (arr[j] > arr[j+1]) {
                  int tmp = arr[j]; arr[j] = arr[j+1]; arr[j+1] = tmp;
              }
          }
      }
  }

  int main() {
      int n;
      scanf("%d", &n);
      int arr[1000];
      for (int i = 0; i < n; i++) scanf("%d", &arr[i]);
      bubbleSort(arr, n);
      for (int i = 0; i < n; i++) {
          if (i > 0) printf(" ");
          printf("%d", arr[i]);
      }
      printf("\n");
      return 0;
  }
