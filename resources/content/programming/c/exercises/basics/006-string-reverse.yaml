hints:
  - "reverseStr: lo=0, hi=strlen-1; swap s[lo] and s[hi] while lo < hi"
  - "isPalindrome: collect only alpha chars (tolower), then compare from both ends"
  - "Or: filter into a temporary array, then check if array equals its reverse"
solution: |
  #include <stdio.h>
  #include <string.h>
  #include <ctype.h>

  void reverseStr(char *s) {
      int lo = 0, hi = strlen(s) - 1;
      while (lo < hi) {
          char tmp = s[lo]; s[lo] = s[hi]; s[hi] = tmp;
          lo++; hi--;
      }
  }

  int isPalindrome(const char *s) {
      char buf[256];
      int n = 0;
      for (int i = 0; s[i]; i++) {
          if (!isspace((unsigned char)s[i]))
              buf[n++] = tolower((unsigned char)s[i]);
      }
      for (int i = 0; i < n/2; i++) {
          if (buf[i] != buf[n-1-i]) return 0;
      }
      return 1;
  }

  int main() {
      char a[256], b[256];
      fgets(a, sizeof(a), stdin);
      fgets(b, sizeof(b), stdin);
      a[strcspn(a, "\n")] = '\0';
      b[strcspn(b, "\n")] = '\0';
      reverseStr(a);
      printf("%s\n", a);
      printf("%s\n", isPalindrome(b) ? "true" : "false");
      return 0;
  }
