id: c-basics-006
title: "String Reversal and Palindrome"
difficulty: 2
tags: [strings, pointers, palindrome, c]
description: |
  Implement two functions:
  1. reverseStr(char *s): reverses a string in-place
  2. isPalindrome(const char *s): returns 1 if palindrome (ignoring case and spaces), 0 otherwise

  Read two lines:
    Line 1: a string to reverse
    Line 2: a string to check for palindrome
  Print the reversed string, then "true" or "false".

  Example:
    Input:
      hello
      A man a plan a canal Panama
    Output:
      olleh
      true
