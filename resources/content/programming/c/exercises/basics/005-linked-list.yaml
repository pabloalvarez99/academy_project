title: "Linked List — Insert and Print"
difficulty: 3
tags: [linked-list, pointers, malloc, structs]
description: |
  Implement a singly linked list in C. Read N integers and insert each at the
  END of the list (append). Then print all values space-separated.

  Input:
    Line 1: N
    Line 2: space-separated integers

  Example:
    Input: 4 / 10 20 30 40
    Output: 10 20 30 40
starter_code: |
  #include <stdio.h>
  #include <stdlib.h>

  typedef struct Node {
      int val;
      struct Node *next;
  } Node;

  Node* append(Node *head, int val) {
      // allocate new node, append to end, return updated head
      return head;
  }

  void printList(Node *head) {
      // print all values space-separated
  }

  void freeList(Node *head) {
      while (head) {
          Node *tmp = head;
          head = head->next;
          free(tmp);
      }
  }

  int main() {
      int n;
      scanf("%d", &n);
      Node *head = NULL;
      for (int i = 0; i < n; i++) {
