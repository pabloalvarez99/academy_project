hints:
  - "Allocate: Node *node = malloc(sizeof(Node)); node->val = val; node->next = NULL;"
  - "To append: traverse to the last node (where next == NULL), then set last->next = node"
  - "If head == NULL, the new node becomes the head"
  - "printList: iterate while head != NULL, print val and advance; use printf('%d', head->val)"
  - "For spacing: print space before each element except the first, or use a flag"
solution: |
  #include <stdio.h>
  #include <stdlib.h>

  typedef struct Node {
      int val;
      struct Node *next;
  } Node;

  Node* append(Node *head, int val) {
      Node *node = malloc(sizeof(Node));
      node->val = val;
      node->next = NULL;
      if (!head) return node;
      Node *curr = head;
      while (curr->next) curr = curr->next;
      curr->next = node;
      return head;
  }

  void printList(Node *head) {
      int first = 1;
      while (head) {
          if (!first) printf(" ");
          printf("%d", head->val);
          first = 0;
          head = head->next;
      }
      printf("\n");
  }

  void freeList(Node *head) {
      while (head) {
          Node *tmp = head;
          head = head->next;
          free(tmp);
      }
  }

  int main() {
      int n;
      scanf("%d", &n);
      Node *head = NULL;
      for (int i = 0; i < n; i++) {
          int v;
          scanf("%d", &v);
          head = append(head, v);
      }
      printList(head);
      freeList(head);
      return 0;
  }
