id: c-basics-001
title: "Hello, World!"
difficulty: 1
tags: [basics, printf, stdio]
description: |
  Write a C program that prints exactly:
  Hello, World!
starter_code: |
  #include <stdio.h>

  int main() {
      // your code here
      return 0;
  }
test_cases:
  - input: ""
    expected_output: "Hello, World!\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
hints:
  - "Use printf() from stdio.h"
  - "printf(\"Hello, World!\\n\") prints the string with a newline"
solution: |
  #include <stdio.h>

  int main() {
      printf("Hello, World!\n");
      return 0;
  }
