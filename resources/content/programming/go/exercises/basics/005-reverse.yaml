id: go-basics-005
title: "Reverse a String"
difficulty: 2
tags: [strings, slices, runes]
description: |
  Write a function Reverse(s string) string that reverses a string.
  Print the reverse of "Engineering".
  Expected output: gnireenignE
starter_code: |
  package main

  import "fmt"

  func Reverse(s string) string {
      // implement here
      return ""
  }

  func main() {
      fmt.Println(Reverse("Engineering"))
  }
test_cases:
  - input: ""
    expected_output: "gnireenignE\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Convert the string to a rune slice: []rune(s)"
  - "Reverse the slice using two pointers"
  - "Convert back to string"
solution: |
  package main

  import "fmt"

  func Reverse(s string) string {
      r := []rune(s)
      for i, j := 0, len(r)-1; i < j; i, j = i+1, j-1 {
          r[i], r[j] = r[j], r[i]
      }
      return string(r)
  }

  func main() {
      fmt.Println(Reverse("Engineering"))
  }
