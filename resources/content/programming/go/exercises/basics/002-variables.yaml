id: go-basics-002
title: "Variable Declaration"
difficulty: 1
tags: [basics, variables, types]
description: |
  Declare an integer variable named x with the value 42, then print it.
  Expected output: 42
starter_code: |
  package main

  import "fmt"

  func main() {
      // declare x here
      fmt.Println(x)
  }
test_cases:
  - input: ""
    expected_output: "42\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use := for short variable declaration: x := 42"
  - "Or use var: var x int = 42"
solution: |
  package main

  import "fmt"

  func main() {
      x := 42
      fmt.Println(x)
  }
metadata:
  version: "1.0.0"
  content_version: 1
  module: programming
  language: go
  category: basics
