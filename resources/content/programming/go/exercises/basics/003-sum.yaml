id: go-basics-003
title: "Sum Two Numbers"
difficulty: 1
tags: [basics, arithmetic, functions]
description: |
  Write a program that computes the sum of two integers a=10 and b=25,
  then prints the result.
  Expected output: 35
starter_code: |
  package main

  import "fmt"

  func main() {
      a := 10
      b := 25
      // compute sum and print it
  }
test_cases:
  - input: ""
    expected_output: "35\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use + operator to add two numbers"
  - "Store the result in a variable: sum := a + b"
solution: |
  package main

  import "fmt"

  func main() {
      a := 10
      b := 25
      sum := a + b
      fmt.Println(sum)
  }
