description: |
  Design a stack that supports push, pop, and getMin in O(1) time.
  Process a sequence of operations and print the result for each GETMIN.

  Operations: PUSH x, POP, GETMIN

  Example:
    PUSH 5
    PUSH 3
    PUSH 7
    GETMIN  → 3
    POP
    GETMIN  → 3
    POP
    GETMIN  → 5
