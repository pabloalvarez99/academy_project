hints:
  - "Use a second 'min stack' that tracks the minimum at each level"
  - "Push: if minStack is empty or val <= top of minStack, push val to minStack too"
  - "Pop: if top of main stack == top of minStack, pop both"
  - "GetMin: return top of minStack"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  type MinStack struct {
      stack    []int
      minStack []int
  }

  func (s *MinStack) Push(val int) {
      s.stack = append(s.stack, val)
      if len(s.minStack) == 0 || val <= s.minStack[len(s.minStack)-1] {
          s.minStack = append(s.minStack, val)
      }
  }

  func (s *MinStack) Pop() {
      top := s.stack[len(s.stack)-1]
      s.stack = s.stack[:len(s.stack)-1]
      if top == s.minStack[len(s.minStack)-1] {
          s.minStack = s.minStack[:len(s.minStack)-1]
      }
  }

  func (s *MinStack) GetMin() int {
      return s.minStack[len(s.minStack)-1]
  }

  func main() {
      scanner := bufio.NewScanner(os.Stdin)
      ms := &MinStack{}
      for scanner.Scan() {
          line := strings.TrimSpace(scanner.Text())
          if line == "" {
              continue
          }
          parts := strings.Fields(line)
          switch parts[0] {
          case "PUSH":
              v, _ := strconv.Atoi(parts[1])
              ms.Push(v)
          case "POP":
              ms.Pop()
          case "GETMIN":
              fmt.Println(ms.GetMin())
          }
      }
  }
