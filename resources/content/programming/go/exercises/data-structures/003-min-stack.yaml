test_cases:
  - input: "PUSH 5\nPUSH 3\nPUSH 7\nGETMIN\nPOP\nGETMIN\nPOP\nGETMIN\n"
    expected_output: "3\n3\n5\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "PUSH 1\nGETMIN\nPUSH 0\nGETMIN\nPOP\nGETMIN\n"
    expected_output: "1\n0\n1\n"
    time_limit_ms: 5000
