  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  func twoSum(nums []int, target int) (int, int) {
      seen := make(map[int]int)
      for i, v := range nums {
          complement := target - v
          if j, ok := seen[complement]; ok {
              if j < i { return j, i }
              return i, j
          }
          seen[v] = i
      }
      return -1, -1
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      parts1 := strings.Fields(strings.TrimSpace(line1))
      n, _ := strconv.Atoi(parts1[0])
      target, _ := strconv.Atoi(parts1[1])
      line2, _ := reader.ReadString('\n')
      parts2 := strings.Fields(strings.TrimSpace(line2))
      nums := make([]int, n)
      for i, p := range parts2 {
          nums[i], _ = strconv.Atoi(p)
      }
      a, b := twoSum(nums, target)
      fmt.Println(a, b)
