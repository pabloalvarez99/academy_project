hints:
  - "Use a sliding window: left and right pointers"
  - "Map[rune]int stores the last seen index of each character"
  - "When right pointer encounters a repeated char, move left to max(left, lastSeen[c]+1)"
  - "Update max = max(max, right-left+1) at each step"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strings"
  )

  func lengthOfLongestSubstring(s string) int {
      seen := make(map[rune]int)
      left := 0
      best := 0
      for right, c := range s {
          if idx, ok := seen[c]; ok && idx >= left {
              left = idx + 1
          }
          seen[c] = right
          if right-left+1 > best {
              best = right - left + 1
          }
      }
      return best
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line, _ := reader.ReadString('\n')
      s := strings.TrimSpace(line)
      fmt.Println(lengthOfLongestSubstring(s))
  }
