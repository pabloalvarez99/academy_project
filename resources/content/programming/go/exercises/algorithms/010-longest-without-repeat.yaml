description: |
  Given a string, find the length of the longest substring without repeating characters.

  Read a string and print the length.

  Examples:
    "abcabcbb" → 3 ("abc")
    "bbbbb"    → 1 ("b")
    "pwwkew"   → 3 ("wke")
    ""         → 0
