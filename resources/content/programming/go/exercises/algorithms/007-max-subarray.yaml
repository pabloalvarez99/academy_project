id: go-algorithms-007
title: "Maximum Subarray (Kadane's)"
difficulty: 3
tags: [dynamic-programming, arrays, greedy]
description: |
  Given an array of integers, find the contiguous subarray with the largest sum
  and print that sum. The array has at least one element.

  Input format:
    Line 1: N (number of elements)
    Line 2: space-separated integers

  Examples:
    [-2, 1, -3, 4, -1, 2, 1, -5, 4] → 6 (subarray [4,-1,2,1])
    [1] → 1
    [-1, -2, -3] → -1 (must pick at least one element)
