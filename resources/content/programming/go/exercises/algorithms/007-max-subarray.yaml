hints:
  - "Initialize maxSum = nums[0], currentSum = nums[0]"
  - "For each subsequent element: currentSum = max(nums[i], currentSum + nums[i])"
  - "Update maxSum = max(maxSum, currentSum)"
  - "The key insight: if currentSum goes negative, start fresh from the current element"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  func maxSubarray(nums []int) int {
      maxSum := nums[0]
      cur := nums[0]
      for _, v := range nums[1:] {
          if cur+v > v {
              cur = cur + v
          } else {
              cur = v
          }
          if cur > maxSum {
              maxSum = cur
          }
      }
      return maxSum
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      n, _ := strconv.Atoi(strings.TrimSpace(line1))
      line2, _ := reader.ReadString('\n')
      parts := strings.Fields(strings.TrimSpace(line2))
      nums := make([]int, n)
      for i, p := range parts {
          nums[i], _ = strconv.Atoi(p)
      }
      fmt.Println(maxSubarray(nums))
  }
