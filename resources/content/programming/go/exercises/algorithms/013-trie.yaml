hints:
  - "Each node has 26 children (one per letter a-z)"
  - "Index char c as: c - 'a'"
  - "Insert: for each char, if child nil create it, then advance node"
  - "At end of word: node.isEnd = true"
  - "Search: walk nodes per char, return false if any child missing, final node.isEnd"
  - "StartsWith: same walk but return true if all chars found (don't check isEnd)"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strings"
  )

  type TrieNode struct {
      children [26]*TrieNode
      isEnd    bool
  }

  type Trie struct{ root *TrieNode }

  func NewTrie() *Trie { return &Trie{root: &TrieNode{}} }

  func (t *Trie) Insert(word string) {
      node := t.root
      for _, c := range word {
          idx := c - 'a'
          if node.children[idx] == nil {
              node.children[idx] = &TrieNode{}
          }
          node = node.children[idx]
      }
      node.isEnd = true
  }

  func (t *Trie) walk(s string) *TrieNode {
      node := t.root
      for _, c := range s {
          idx := c - 'a'
          if node.children[idx] == nil { return nil }
          node = node.children[idx]
      }
      return node
  }

  func (t *Trie) Search(word string) bool {
      n := t.walk(word)
      return n != nil && n.isEnd
  }

  func (t *Trie) StartsWith(prefix string) bool {
      return t.walk(prefix) != nil
  }

  func main() {
      scanner := bufio.NewScanner(os.Stdin)
      trie := NewTrie()
      for scanner.Scan() {
          parts := strings.Fields(scanner.Text())
          if len(parts) < 2 { continue }
          switch parts[0] {
          case "INSERT":     trie.Insert(parts[1])
          case "SEARCH":     fmt.Println(trie.Search(parts[1]))
          case "STARTSWITH": fmt.Println(trie.StartsWith(parts[1]))
          }
      }
  }
