description: |
  Implement a min-heap priority queue using Go's container/heap interface.

  Read N tasks, each with a name and priority (lower number = higher priority).
  Process them in priority order (min first). If priorities are equal, process
  in the order they were inserted (stable).

  Input: N, then N lines of "name priority"
  Output: names in processing order, one per line
