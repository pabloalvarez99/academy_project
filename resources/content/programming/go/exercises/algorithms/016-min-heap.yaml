  - "Push: *h = append(*h, x.(Task))"
  - "Pop: old := *h; n := len(old); x := old[n-1]; *h = old[:n-1]; return x"
  - "heap.Init, heap.Push, heap.Pop handle the heap property automatically"
  - "Less returning h[i].index < h[j].index for equal priorities gives FIFO (stable) ordering"
solution: |
  package main

  import (
      "container/heap"
      "fmt"
      "os"
  )

  type Task struct {
      name     string
      priority int
      index    int
  }

  type MinHeap []Task

  func (h MinHeap) Len() int { return len(h) }
  func (h MinHeap) Less(i, j int) bool {
      if h[i].priority != h[j].priority {
          return h[i].priority < h[j].priority
      }
      return h[i].index < h[j].index
  }
  func (h MinHeap) Swap(i, j int) { h[i], h[j] = h[j], h[i] }

  func (h *MinHeap) Push(x any) {
      *h = append(*h, x.(Task))
  }

  func (h *MinHeap) Pop() any {
      old := *h
      n := len(old)
      x := old[n-1]
      *h = old[:n-1]
      return x
  }

  func main() {
      var n int
      fmt.Fscan(os.Stdin, &n)

      h := &MinHeap{}
      heap.Init(h)

      for i := 0; i < n; i++ {
          var name string
          var priority int
          fmt.Fscan(os.Stdin, &name, &priority)
          heap.Push(h, Task{name, priority, i})
      }

      for h.Len() > 0 {
          task := heap.Pop(h).(Task)
          fmt.Println(task.name)
      }
  }
