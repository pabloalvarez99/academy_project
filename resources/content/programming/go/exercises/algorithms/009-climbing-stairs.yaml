hints:
  - "Base cases: ways(1)=1, ways(2)=2"
  - "Each step, you could have come from step n-1 (1 step) or step n-2 (2 steps)"
  - "Use two variables instead of an array to save space: a, b = b, a+b"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  func climbStairs(n int) int {
      if n <= 2 {
          return n
      }
      a, b := 1, 2
      for i := 3; i <= n; i++ {
          a, b = b, a+b
      }
      return b
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line, _ := reader.ReadString('\n')
      n, _ := strconv.Atoi(strings.TrimSpace(line))
      fmt.Println(climbStairs(n))
  }
