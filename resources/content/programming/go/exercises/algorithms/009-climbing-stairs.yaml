title: "Climbing Stairs (DP)"
difficulty: 2
tags: [dynamic-programming, fibonacci-variant, dp]
description: |
  You are climbing N stairs, taking 1 or 2 steps at a time.
  How many distinct ways can you reach the top?

  Read N and print the answer.

  Examples:
    2 → 2  ([1,1] or [2])
    3 → 3  ([1,1,1], [1,2], [2,1])
    10 → 89
