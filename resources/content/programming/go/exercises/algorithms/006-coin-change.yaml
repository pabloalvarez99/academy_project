id: go-algorithms-006
title: "Coin Change"
difficulty: 4
tags: [dynamic-programming, arrays, dp]
description: |
  Given coin denominations and a target amount, find the minimum number of coins
  needed to make exactly that amount. If impossible, print -1.

  Input format:
    Line 1: N (number of denominations)
    Line 2: space-separated denominations
    Line 3: target amount

  Examples:
    3 coins [1 5 10], target 11 → 2 (10+1)
    1 coin  [2],       target 3  → -1 (impossible)
    3 coins [1 2 5],   target 11 → 3 (5+5+1)
starter_code: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  func coinChange(coins []int, amount int) int {
      // Use bottom-up DP
      // dp[i] = minimum coins to make amount i
      return -1
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      n, _ := strconv.Atoi(strings.TrimSpace(line1))
      line2, _ := reader.ReadString('\n')
      parts := strings.Fields(strings.TrimSpace(line2))
      coins := make([]int, n)
      for i, p := range parts {
          coins[i], _ = strconv.Atoi(p)
      }
      line3, _ := reader.ReadString('\n')
      amount, _ := strconv.Atoi(strings.TrimSpace(line3))
      fmt.Println(coinChange(coins, amount))
  }
test_cases:
  - input: "3\n1 5 10\n11\n"
    expected_output: "2\n"
    time_limit_ms: 5000
