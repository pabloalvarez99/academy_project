id: ts-017
title: "Async Generator — Paginated Results"
difficulty: 2
tags: [async-generators, typescript, iterators, pagination]
description: |
  Implement an async generator that yields paginated results.

  async function* asyncPages<T>(data: T[], pageSize: number): AsyncGenerator<T[]>

  Each iteration yields one page (a slice of data of length pageSize).
  The last page may be shorter if data length is not evenly divisible by pageSize.

  Input format:
    First line: pageSize (integer)
    Remaining lines: one item per line (the data array)

  For each page yielded, print all items on that page joined with a comma on one line.

  Example — pageSize=2, data=[a,b,c,d,e]:
    a,b
    c,d
    e
starter_code: |
  import * as readline from 'readline';

  async function* asyncPages<T>(data: T[], pageSize: number): AsyncGenerator<T[]> {
    // implement here — yield slices of data
  }

  const rl = readline.createInterface({ input: process.stdin });
  const lines: string[] = [];
  rl.on('line', l => lines.push(l.trim()));
  rl.on('close', async () => {
    const pageSize = parseInt(lines[0]);
    const data = lines.slice(1).filter(l => l.length > 0);
    for await (const page of asyncPages(data, pageSize)) {
      console.log(page.join(','));
    }
  });
test_cases:
  - input: "2\na\nb\nc\nd\ne\n"
    expected_output: "a,b\nc,d\ne\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "3\nfoo\nbar\nbaz\nqux\n"
    expected_output: "foo,bar,baz\nqux\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "4\none\ntwo\nthree\nfour\n"
    expected_output: "one,two,three,four\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
hints:
  - "Use a for loop stepping by pageSize: for (let i = 0; i < data.length; i += pageSize)"
  - "Yield each slice: yield data.slice(i, i + pageSize)"
  - "The 'async function*' syntax creates an AsyncGenerator — you can use 'for await...of' to consume it"
  - "No actual async work is needed here; the generator just slices synchronously and yields"
solution: |
  import * as readline from 'readline';

  async function* asyncPages<T>(data: T[], pageSize: number): AsyncGenerator<T[]> {
    for (let i = 0; i < data.length; i += pageSize) {
      yield data.slice(i, i + pageSize);
    }
  }

  const rl = readline.createInterface({ input: process.stdin });
  const lines: string[] = [];
  rl.on('line', l => lines.push(l.trim()));
  rl.on('close', async () => {
    const pageSize = parseInt(lines[0]);
    const data = lines.slice(1).filter(l => l.length > 0);
    for await (const page of asyncPages(data, pageSize)) {
      console.log(page.join(','));
    }
  });
