id: ts-014
title: "Discriminated Union — Shape Areas"
difficulty: 2
tags: [discriminated-union, type-narrowing, typescript, generics]
description: |
  Define a discriminated union type for shapes and compute the area of each.

  type Shape =
    | { kind: 'circle';   r: number }
    | { kind: 'rect';     w: number; h: number }
    | { kind: 'triangle'; b: number; h: number }

  Implement: function area(shape: Shape): number

  Area formulas:
    circle:   Math.PI * r * r
    rect:     w * h
    triangle: 0.5 * b * h

  Read shapes from stdin, one per line. Each line is space-separated:
    circle R
    rect W H
    triangle B H

  Print the area of each shape rounded to 2 decimal places on its own line.
starter_code: |
  import * as readline from 'readline';

  type Shape =
    | { kind: 'circle';   r: number }
    | { kind: 'rect';     w: number; h: number }
    | { kind: 'triangle'; b: number; h: number };

  function area(shape: Shape): number {
    // implement here — use a switch on shape.kind
    return 0;
  }

  const rl = readline.createInterface({ input: process.stdin });
  rl.on('line', line => {
    const parts = line.trim().split(' ');
    let shape: Shape;
    if (parts[0] === 'circle') {
      shape = { kind: 'circle', r: parseFloat(parts[1]) };
    } else if (parts[0] === 'rect') {
      shape = { kind: 'rect', w: parseFloat(parts[1]), h: parseFloat(parts[2]) };
    } else {
      shape = { kind: 'triangle', b: parseFloat(parts[1]), h: parseFloat(parts[2]) };
    }
    console.log(area(shape).toFixed(2));
  });
