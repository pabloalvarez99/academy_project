hints:
  - "Use 'switch (shape.kind)' — TypeScript narrows the type in each case branch"
  - "In the 'circle' branch, shape.r is available; in 'rect', shape.w and shape.h, etc."
  - "Add a default branch that calls a never-check: 'const _: never = shape' to catch missing cases"
  - "Math.PI * r * r for circle; w * h for rect; 0.5 * b * h for triangle"
solution: |
  import * as readline from 'readline';

  type Shape =
    | { kind: 'circle';   r: number }
    | { kind: 'rect';     w: number; h: number }
    | { kind: 'triangle'; b: number; h: number };

  function area(shape: Shape): number {
    switch (shape.kind) {
      case 'circle':   return Math.PI * shape.r * shape.r;
      case 'rect':     return shape.w * shape.h;
      case 'triangle': return 0.5 * shape.b * shape.h;
      default: {
        const _: never = shape;
        throw new Error(`Unknown shape: ${_}`);
      }
    }
  }

  const rl = readline.createInterface({ input: process.stdin });
  rl.on('line', line => {
    const parts = line.trim().split(' ');
    let shape: Shape;
    if (parts[0] === 'circle') {
      shape = { kind: 'circle', r: parseFloat(parts[1]) };
    } else if (parts[0] === 'rect') {
      shape = { kind: 'rect', w: parseFloat(parts[1]), h: parseFloat(parts[2]) };
    } else {
      shape = { kind: 'triangle', b: parseFloat(parts[1]), h: parseFloat(parts[2]) };
    }
    console.log(area(shape).toFixed(2));
  });
