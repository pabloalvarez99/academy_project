hints:
  - "dict[str, int] is valid in Python 3.10+ without importing from typing"
  - "To merge: result = {**d1}; for k, v in d2.items(): result[k] = result.get(k, 0) + v"
  - "Use functools.reduce(merge_dicts, dicts) to fold over all dicts"
  - "sorted(result.items()) returns (key, value) pairs sorted alphabetically by key"
solution: |
  import sys
  import json
  from functools import reduce

  def merge_dicts(d1: dict[str, int], d2: dict[str, int]) -> dict[str, int]:
      result = dict(d1)
      for k, v in d2.items():
          result[k] = result.get(k, 0) + v
      return result

  lines = sys.stdin.read().strip().splitlines()
  dicts = []
  for line in lines:
      line = line.strip()
      if line:
          dicts.append(json.loads(line))

  if dicts:
      merged = reduce(merge_dicts, dicts)
      for key, value in sorted(merged.items()):
          print(f"{key}: {value}")
