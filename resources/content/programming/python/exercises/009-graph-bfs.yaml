id: py-algorithms-002
title: "Graph BFS — Shortest Path"
difficulty: 3
tags: [graph, bfs, shortest-path, algorithms]
description: |
  Given an undirected graph and two nodes, find the shortest path length between them.
  If unreachable, print -1.

  Input format:
    Line 1: V E (vertices 0..V-1, edges)
    Next E lines: u v (undirected edge)
    Last line: start end

  Example:
    6 7
    0 1
    0 2
    1 3
    2 3
    3 4
    4 5
    2 5
    0 5 → 3 (0→2→5 or 0→1→3→4→5 is 4, shortest is 3: 0→2→5)
starter_code: |
  from collections import deque
  import sys

  def bfs(graph, start, end):
      # return shortest path length or -1
      return -1

  lines = sys.stdin.read().split('\n')
  v, e = map(int, lines[0].split())
  graph = [[] for _ in range(v)]
  for i in range(1, e + 1):
      u, w = map(int, lines[i].split())
      graph[u].append(w)
      graph[w].append(u)
  s, t = map(int, lines[e + 1].split())
  print(bfs(graph, s, t))
test_cases:
  - input: "6 7\n0 1\n0 2\n1 3\n2 3\n3 4\n4 5\n2 5\n0 5\n"
