hints:
  - "text.translate(str.maketrans('', '', string.punctuation)) removes all punctuation"
  - "Counter(words).most_common() returns (word, count) pairs sorted by count desc"
  - "For tie-breaking, sort by (-count, word) so words with same count sort alphabetically"
  - "namedtuple repr prints as WordCount(word='x', count=n) automatically"
solution: |
  import sys
  import string
  from collections import namedtuple, Counter

  WordCount = namedtuple('WordCount', ['word', 'count'])

  text = sys.stdin.read().lower()
  text = text.translate(str.maketrans('', '', string.punctuation))
  words = text.split()

  counter = Counter(words)
  sorted_words = sorted(counter.items(), key=lambda x: (-x[1], x[0]))
  top5 = sorted_words[:5]

  for word, count in top5:
      print(WordCount(word=word, count=count))
