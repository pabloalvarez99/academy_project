id: py-advanced-011
title: "Namedtuple and Counter"
difficulty: 2
tags: [python, collections, namedtuple, counter, word-frequency]
description: |
  Use collections.namedtuple and Counter together for word frequency analysis.
  Define WordCount = namedtuple('WordCount', ['word', 'count']).
  Read all text from stdin, tokenize into lowercase words (strip punctuation), count frequencies with Counter.
  Print the top 5 words as WordCount namedtuples, sorted by count descending then word ascending for ties.

  Input format:
    Multiple lines of text
  Output:
    5 lines of "WordCount(word='<word>', count=<count>)" using the namedtuple repr
