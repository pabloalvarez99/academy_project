id: py-algorithms-003
title: "Matrix Spiral Traversal"
difficulty: 4
tags: [matrix, simulation, algorithms]
description: |
  Given an M×N matrix, return all elements in spiral order (clockwise from top-left).
  Print elements space-separated on a single line.

  Input:
    Line 1: M N (rows, cols)
    Next M lines: N space-separated integers each

  Example:
    3 3 matrix:
      1 2 3
      4 5 6
      7 8 9
    Output: 1 2 3 6 9 8 7 4 5
starter_code: |
  import sys

  def spiral(matrix):
      result = []
      # Peel the outer layer, recurse/loop inward
      return result

  data = sys.stdin.read().split('\n')
  m, n = map(int, data[0].split())
  matrix = [list(map(int, data[i+1].split())) for i in range(m)]
  print(' '.join(map(str, spiral(matrix))))
