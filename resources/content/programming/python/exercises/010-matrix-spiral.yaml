hints:
  - "Maintain four boundaries: top, bottom, left, right"
  - "Traverse: left→right (top row), then top→bottom (right col), then right→left (bottom row), then bottom→top (left col)"
  - "After each direction, shrink the boundary in that direction"
  - "Stop when top > bottom or left > right"
solution: |
  import sys

  def spiral(matrix):
      if not matrix:
          return []
      result = []
      top, bottom, left, right = 0, len(matrix)-1, 0, len(matrix[0])-1
      while top <= bottom and left <= right:
          for c in range(left, right+1):
              result.append(matrix[top][c])
          top += 1
          for r in range(top, bottom+1):
              result.append(matrix[r][right])
          right -= 1
          if top <= bottom:
              for c in range(right, left-1, -1):
                  result.append(matrix[bottom][c])
              bottom -= 1
          if left <= right:
              for r in range(bottom, top-1, -1):
                  result.append(matrix[r][left])
              left += 1
      return result

  data = sys.stdin.read().split('\n')
  m, n = map(int, data[0].split())
  matrix = [list(map(int, data[i+1].split())) for i in range(m)]
  print(' '.join(map(str, spiral(matrix))))
