id: py-advanced-010
title: "Itertools"
difficulty: 2
tags: [python, itertools, chain, groupby, islice, combinations]
description: |
  Practice the itertools module with four operations.
  Read one command per run and print the result.

  Input format:
    chain a b c | x y z          → chain two space-separated groups, print each element
    groupby a a b b b c           → group consecutive equal elements, print "key: count"
    islice n a b c d e f ...      → print first n elements from the sequence
    combinations n a b c d ...    → print all combinations of length n, space-separated tuples
  Output:
    One element or group per line
