id: py-advanced-007
title: "Functools"
difficulty: 2
tags: [python, functools, reduce, partial, lru_cache, higher-order-functions]
description: |
  Practice the functools module with three utilities:
  1. reduce(): multiply all numbers in a list
  2. partial(): create a square() function from a general power(base, exp) function
  3. lru_cache(): memoized fibonacci

  Read one command per line and print the result.

  Input format:
    reduce n1 n2 ...     → print product of all numbers
    square n             → print n squared using partial-based square()
    fib n                → print nth Fibonacci number (0-indexed) using lru_cache
  Output:
    One result per line
