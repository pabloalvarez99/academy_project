hints:
  - "reduce(lambda a, b: a * b, numbers) multiplies all elements"
  - "partial(power, exp=2) won't work because exp is the second positional arg; use partial(power, **{'exp':2}) or define square differently: partial(lambda b, e: b**e, e=2) — simplest: square = lambda n: power(n, 2) or use partial with keyword"
  - "Clearest partial: define power(base, exp) and use square = partial(power, exp=2)"
  - "@lru_cache memoizes recursive calls; fib(n) = fib(n-1) + fib(n-2), base cases fib(0)=0, fib(1)=1"
solution: |
  import sys
  from functools import reduce, partial, lru_cache

  def multiply_all(numbers: list[int]) -> int:
      return reduce(lambda a, b: a * b, numbers)

  def power(base: int, exp: int) -> int:
      return base ** exp

  square = partial(power, exp=2)

  @lru_cache(maxsize=None)
  def fib(n: int) -> int:
      if n <= 0:
          return 0
      if n == 1:
          return 1
      return fib(n - 1) + fib(n - 2)

  for line in sys.stdin:
      parts = line.split()
      if not parts:
          continue
      cmd = parts[0]
      if cmd == 'reduce':
          nums = list(map(int, parts[1:]))
          print(multiply_all(nums))
      elif cmd == 'square':
          print(square(int(parts[1])))
      elif cmd == 'fib':
          print(fib(int(parts[1])))
