hints:
  - "Circle area: math.pi * r * r; perimeter: 2 * math.pi * r"
  - "Rectangle area: w * h; perimeter: 2 * (w + h)"
  - "Heron's formula: s=(a+b+c)/2; area=sqrt(s*(s-a)*(s-b)*(s-c))"
  - "Triangle perimeter: a+b+c"
solution: |
  import sys
  import math
  from abc import ABC, abstractmethod

  class Shape(ABC):
      @abstractmethod
      def area(self) -> float: ...
      @abstractmethod
      def perimeter(self) -> float: ...

  class Circle(Shape):
      def __init__(self, r): self.r = r
      def area(self): return math.pi * self.r ** 2
      def perimeter(self): return 2 * math.pi * self.r

  class Rectangle(Shape):
      def __init__(self, w, h): self.w, self.h = w, h
      def area(self): return self.w * self.h
      def perimeter(self): return 2 * (self.w + self.h)

  class Triangle(Shape):
      def __init__(self, a, b, c): self.a, self.b, self.c = a, b, c
      def area(self):
          s = (self.a + self.b + self.c) / 2
          return math.sqrt(s * (s-self.a) * (s-self.b) * (s-self.c))
      def perimeter(self): return self.a + self.b + self.c

  lines = sys.stdin.read().split('\n')
  n = int(lines[0])
  for i in range(1, n+1):
      parts = lines[i].split()
      if parts[0] == 'circle':
          s = Circle(float(parts[1]))
      elif parts[0] == 'rect':
          s = Rectangle(float(parts[1]), float(parts[2]))
      else:
          s = Triangle(float(parts[1]), float(parts[2]), float(parts[3]))
      print(f"{s.area():.2f} {s.perimeter():.2f}")
