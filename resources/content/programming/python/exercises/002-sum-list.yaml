id: py-basics-002
title: "Sum a List"
difficulty: 1
tags: [lists, built-ins]
description: |
  Given the list [1, 2, 3, 4, 5], print the sum of all elements.
  Expected output: 15
starter_code: |
  numbers = [1, 2, 3, 4, 5]
  # compute and print the sum
test_cases:
  - input: ""
    expected_output: "15\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Python has a built-in sum() function"
  - "sum(numbers) returns the total"
solution: |
  numbers = [1, 2, 3, 4, 5]
  print(sum(numbers))
