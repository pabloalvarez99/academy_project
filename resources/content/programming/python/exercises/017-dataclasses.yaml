hints:
  - "@dataclass auto-generates __init__, __repr__, __eq__"
  - "sorted(items, key=lambda x: x.total_value(), reverse=True)"
  - "Use float(parts[1]) and int(parts[2]) when parsing each line"
solution: |
  from dataclasses import dataclass
  import sys

  @dataclass
  class Product:
      name: str
      price: float
      stock: int

      def total_value(self) -> float:
          return self.price * self.stock

  products = []
  for line in sys.stdin:
      line = line.strip()
      if not line:
          continue
      parts = line.split()
      products.append(Product(parts[0], float(parts[1]), int(parts[2])))

  for p in sorted(products, key=lambda x: x.total_value(), reverse=True):
      print(f"{p.name}: {p.total_value()}")
