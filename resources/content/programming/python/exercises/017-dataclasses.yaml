id: py-advanced-004
title: "Dataclasses"
difficulty: 2
tags: [python, dataclasses, oop]
description: |
  Use Python's @dataclass decorator to define a Product with fields: name (str), price (float), stock (int).
  Implement a method total_value() returning price * stock.
  Read N products (one per line: "name price stock"), print "name: total_value" for each, sorted by total_value descending.

  Input format:
    Each line: name price stock
  Output:
    Each line: "name: total_value" sorted by total_value descending
