hints:
  - "await asyncio.sleep(delay_ms / 1000) converts milliseconds to seconds"
  - "asyncio.gather(*coroutines) runs all coroutines concurrently"
  - "Print inside fetch after the sleep to get completion-order output"
  - "asyncio.run(main()) is the entry point for running an async program"
solution: |
  import asyncio
  import sys

  async def fetch(url: str, delay_ms: int) -> None:
      await asyncio.sleep(delay_ms / 1000)
      print(f"fetched: {url}")

  async def main(tasks: list[tuple[str, int]]) -> None:
      coroutines = [fetch(url, delay) for url, delay in tasks]
      await asyncio.gather(*coroutines)

  lines = sys.stdin.read().strip().splitlines()
  tasks = []
  for line in lines:
      line = line.strip()
      if line:
          parts = line.split()
          tasks.append((parts[0], int(parts[1])))

  asyncio.run(main(tasks))
