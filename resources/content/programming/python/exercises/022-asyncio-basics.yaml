test_cases:
  - input: "https://slow.io 300\nhttps://fast.io 100\nhttps://mid.io 200\n"
    expected_output: "fetched: https://fast.io\nfetched: https://mid.io\nfetched: https://slow.io\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "https://a.com 50\nhttps://b.com 50\nhttps://c.com 150\n"
    expected_output: "fetched: https://a.com\nfetched: https://b.com\nfetched: https://c.com\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
