description: |
  Use asyncio to simulate concurrent I/O. Implement async def fetch(url, delay) that
  sleeps for delay seconds (simulating network I/O) then prints "fetched: url".
  Run all fetches concurrently using asyncio.gather().

  Read lines from stdin where each line is "url delay_ms". Launch all fetches concurrently.
  The output order is determined by delay (shortest delay completes first).

  Input format:
    Each line: "url delay_ms"   (delay_ms is milliseconds as an integer)
  Output:
    "fetched: url" printed as each fetch completes (shortest delay first)
