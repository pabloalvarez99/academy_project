id: cpp-basics-004
title: "Palindrome Check"
difficulty: 2
tags: [strings, palindrome, stl]
description: |
  Read a string from stdin. Print "true" if it is a palindrome (case-insensitive,
  only alphanumeric characters count), or "false" otherwise.

  Examples:
    "racecar"                      → true
    "A man a plan a canal Panama"  → true
    "hello"                        → false
starter_code: |
  #include <iostream>
  #include <string>
  #include <algorithm>

  int main() {
      std::string line;
      std::getline(std::cin, line);
      // normalize and check palindrome
      return 0;
  }
test_cases:
  - input: "racecar\n"
    expected_output: "true\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "hello\n"
    expected_output: "false\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "A man a plan a canal Panama\n"
    expected_output: "true\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Filter to only alphanumeric chars using isalnum(), convert to lowercase with tolower()"
  - "Use std::reverse on a copy and compare"
solution: |
  #include <iostream>
  #include <string>
  #include <algorithm>
  #include <cctype>

  int main() {
      std::string line;
      std::getline(std::cin, line);
      std::string filtered;
      for (char c : line) {
          if (isalnum(c)) filtered += tolower(c);
      }
      std::string rev = filtered;
      std::reverse(rev.begin(), rev.end());
      std::cout << (filtered == rev ? "true" : "false") << std::endl;
      return 0;
  }
