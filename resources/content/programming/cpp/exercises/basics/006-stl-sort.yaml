title: "STL Sort and Custom Comparator"
difficulty: 2
tags: [stl, sort, lambda, comparator, cpp]
description: |
  Read N integers and sort them in descending order using std::sort with a custom
  comparator (lambda). Then print them space-separated.

  Bonus: also read a target K and print how many numbers are >= K using std::count_if.

  Input:
    Line 1: N K
    Line 2: N integers

  Example:
    Input: 5 3 / 7 2 9 1 5
    Output:
      9 7 5 2 1
      3
