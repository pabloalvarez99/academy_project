test_cases:
  - input: "5 3\n7 2 9 1 5\n"
    expected_output: "9 7 5 2 1\n3\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "4 5\n3 8 1 6\n"
    expected_output: "8 6 3 1\n2\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
hints:
  - "sort(v.begin(), v.end(), [](int a, int b){ return a > b; })"
  - "count_if(v.begin(), v.end(), [k](int x){ return x >= k; })"
  - "Print with a loop or copy to ostream with spaces"
solution: |
  #include <iostream>
  #include <vector>
  #include <algorithm>
  using namespace std;

  int main() {
      int n, k;
      cin >> n >> k;
      vector<int> v(n);
      for (int &x : v) cin >> x;

      sort(v.begin(), v.end(), [](int a, int b){ return a > b; });

      for (int i = 0; i < n; i++) {
          if (i) cout << " ";
          cout << v[i];
      }
      cout << "\n";

      int cnt = count_if(v.begin(), v.end(), [k](int x){ return x >= k; });
      cout << cnt << "\n";

      return 0;
  }
