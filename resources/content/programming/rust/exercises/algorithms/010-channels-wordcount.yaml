hints:
  - "Split the text on whitespace using split_whitespace() to handle multiple spaces"
  - "Use a HashMap<String, usize> and increment the count for each word with the entry API"
  - "entry(word).or_insert(0) returns a mutable reference to the count; dereference and add 1"
  - "Collect the map into a Vec of (String, usize) tuples and sort by the key before printing"
solution: |
  use std::io::{self, BufRead};
  use std::collections::HashMap;

  fn word_count(text: &str) -> HashMap<String, usize> {
      let mut counts = HashMap::new();
      for word in text.split_whitespace() {
          *counts.entry(word.to_string()).or_insert(0) += 1;
      }
      counts
  }

  fn main() {
      let stdin = io::stdin();
      let mut all_text = String::new();
      for line in stdin.lock().lines() {
          let line = line.unwrap();
          all_text.push_str(&line);
          all_text.push(' ');
      }
      let counts = word_count(&all_text);
      let mut pairs: Vec<(String, usize)> = counts.into_iter().collect();
      pairs.sort_by(|a, b| a.0.cmp(&b.0));
      for (word, count) in pairs {
          println!("{} {}", word, count);
      }
  }
