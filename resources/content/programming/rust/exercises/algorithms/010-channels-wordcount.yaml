id: rust-algorithms-010
title: "Word Frequency Count"
difficulty: 2
tags: [hashmap, word-count, strings, algorithms, rust]
description: |
  Count how many times each word appears in the input.

  Read lines from stdin until EOF. Words are separated by whitespace and are
  case-sensitive. Print each unique word and its count on a separate line,
  formatted as "word count", sorted alphabetically by word.
starter_code: |
  use std::io::{self, BufRead};
  use std::collections::HashMap;

  fn word_count(text: &str) -> HashMap<String, usize> {
      // implement here
      HashMap::new()
  }

  fn main() {
      let stdin = io::stdin();
      let mut all_text = String::new();
      for line in stdin.lock().lines() {
          let line = line.unwrap();
          all_text.push_str(&line);
          all_text.push(' ');
      }
      let counts = word_count(&all_text);
      let mut pairs: Vec<(String, usize)> = counts.into_iter().collect();
      pairs.sort_by(|a, b| a.0.cmp(&b.0));
      for (word, count) in pairs {
          println!("{} {}", word, count);
      }
  }
test_cases:
