id: rust-algorithms-005
title: "Coin Change"
difficulty: 3
tags: [dynamic-programming, coin-change, algorithms, rust]
description: |
  Find the minimum number of coins to make a target amount.

  Read C on the first line (number of coin denominations), then C integers on the
  second line (the coin values), then the target amount on the third line.
  Print the minimum number of coins needed, or -1 if the amount cannot be made.
starter_code: |
  use std::io::{self, BufRead};

  fn coin_change(coins: &[u64], amount: u64) -> i64 {
      // implement here
      -1
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let _c: usize = lines.next().unwrap().trim().parse().unwrap();
      let coins: Vec<u64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let amount: u64 = lines.next().unwrap().trim().parse().unwrap();
      println!("{}", coin_change(&coins, amount));
  }
test_cases:
