hints:
  - "The number of ways to reach step n equals ways(n-1) + ways(n-2) — this is the Fibonacci sequence"
  - "Base cases: ways(1) = 1, ways(2) = 2"
  - "Use two variables instead of a full array: just track the previous two values"
solution: |
  use std::io::{self, BufRead};

  fn climbing_stairs(n: u64) -> u64 {
      if n <= 2 {
          return n;
      }
      let (mut a, mut b) = (1u64, 2u64);
      for _ in 3..=n {
          let c = a + b;
          a = b;
          b = c;
      }
      b
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let n: u64 = lines.next().unwrap().trim().parse().unwrap();
      println!("{}", climbing_stairs(n));
  }
