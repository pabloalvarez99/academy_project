id: rust-algorithms-001
title: "Binary Search"
difficulty: 2
tags: [binary-search, algorithms, rust]
description: |
  Implement binary search on a sorted array.

  Read N on the first line, then N sorted integers, then a target T.
  Print the index (0-based) of T, or -1 if not found.
starter_code: |
  use std::io::{self, BufRead};

  fn binary_search(arr: &[i64], target: i64) -> i64 {
      // implement here
      -1
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let target: i64 = lines.next().unwrap().trim().parse().unwrap();
      println!("{}", binary_search(&arr, target));
  }
test_cases:
  - input: "5\n1 3 5 7 9\n5\n"
    expected_output: "2\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "5\n1 3 5 7 9\n4\n"
    expected_output: "-1\n"
    time_limit_ms: 5000
