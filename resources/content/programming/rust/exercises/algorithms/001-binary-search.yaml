    memory_limit_kb: 131072
hints:
  - "Use lo/hi pointers, mid = lo + (hi-lo)/2 to avoid overflow"
  - "If arr[mid] < target, search right half; if > target, search left"
  - "Loop while lo <= hi; return -1 after the loop if nothing was found"
solution: |
  use std::io::{self, BufRead};

  fn binary_search(arr: &[i64], target: i64) -> i64 {
      let (mut lo, mut hi) = (0i64, arr.len() as i64 - 1);
      while lo <= hi {
          let mid = lo + (hi - lo) / 2;
          match arr[mid as usize].cmp(&target) {
              std::cmp::Ordering::Equal   => return mid,
              std::cmp::Ordering::Less    => lo = mid + 1,
              std::cmp::Ordering::Greater => hi = mid - 1,
          }
      }
      -1
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let target: i64 = lines.next().unwrap().trim().parse().unwrap();
      println!("{}", binary_search(&arr, target));
  }
