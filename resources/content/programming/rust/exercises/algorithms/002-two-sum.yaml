hints:
  - "Use a HashMap<i64, usize> to store value -> index as you iterate"
  - "For each element x, check if (target - x) is already in the map"
  - "Insert x into the map after checking, so you never use the same index twice"
solution: |
  use std::io::{self, BufRead};
  use std::collections::HashMap;

  fn two_sum(arr: &[i64], target: i64) -> (usize, usize) {
      let mut seen: HashMap<i64, usize> = HashMap::new();
      for (i, &x) in arr.iter().enumerate() {
          let complement = target - x;
          if let Some(&j) = seen.get(&complement) {
              return (j, i);
          }
          seen.insert(x, i);
      }
      unreachable!("guaranteed one solution")
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let _n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let target: i64 = lines.next().unwrap().trim().parse().unwrap();
      let (i, j) = two_sum(&arr, target);
      println!("{} {}", i, j);
  }
