  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let first: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let (v, e) = (first[0], first[1]);
      let mut graph = vec![vec![]; v];
      for _ in 0..e {
          let edge: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
          graph[edge[0]].push(edge[1]);
          graph[edge[1]].push(edge[0]);
      }
      let sd: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
