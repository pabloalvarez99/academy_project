description: |
  Find the shortest path between two nodes in an unweighted undirected graph using BFS.

  Read V (vertices) and E (edges) on the first line.
  Then E lines each containing two integers u and v (0-based) representing an undirected edge.
  Then read the source and destination on the last line.
  Print the shortest path length (number of edges), or -1 if no path exists.
