hints:
  - "Use a VecDeque as your BFS queue; enqueue (node, distance) pairs"
  - "Track visited nodes with a Vec<bool> to avoid revisiting"
  - "If src == dst, the answer is 0"
  - "Dequeue a node, check if it is the destination, then enqueue all unvisited neighbors with distance+1"
solution: |
  use std::io::{self, BufRead};
  use std::collections::VecDeque;

  fn bfs_shortest_path(graph: &Vec<Vec<usize>>, src: usize, dst: usize) -> i64 {
      if src == dst {
          return 0;
      }
      let n = graph.len();
      let mut visited = vec![false; n];
      let mut queue = VecDeque::new();
      visited[src] = true;
      queue.push_back((src, 0i64));
      while let Some((node, dist)) = queue.pop_front() {
          for &neighbor in &graph[node] {
              if neighbor == dst {
                  return dist + 1;
              }
              if !visited[neighbor] {
                  visited[neighbor] = true;
                  queue.push_back((neighbor, dist + 1));
              }
          }
      }
      -1
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let first: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let (v, e) = (first[0], first[1]);
      let mut graph = vec![vec![]; v];
      for _ in 0..e {
          let edge: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
          graph[edge[0]].push(edge[1]);
          graph[edge[1]].push(edge[0]);
      }
      let sd: Vec<usize> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      println!("{}", bfs_shortest_path(&graph, sd[0], sd[1]));
  }
