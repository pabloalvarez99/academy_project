id: rust-algorithms-009
title: "Maximum Subarray Sum"
difficulty: 2
tags: [kadane, dynamic-programming, arrays, algorithms, rust]
description: |
  Find the contiguous subarray with the largest sum (Kadane's algorithm).

  Read N on the first line, then N integers (which may be negative) on the second line.
  Print the maximum subarray sum. The subarray must contain at least one element.
starter_code: |
  use std::io::{self, BufRead};

  fn max_subarray(arr: &[i64]) -> i64 {
      // implement here
      0
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let _n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      println!("{}", max_subarray(&arr));
  }
test_cases:
  - input: "9\n-2 1 -3 4 -1 2 1 -5 4\n"
    expected_output: "6\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "5\n-1 -2 -3 -4 -5\n"
    expected_output: "-1\n"
    time_limit_ms: 5000
