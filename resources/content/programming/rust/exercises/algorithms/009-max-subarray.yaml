  - input: "4\n1 2 3 4\n"
    expected_output: "10\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
hints:
  - "Keep track of current_sum and best_sum, both starting at arr[0]"
  - "At each element x: current_sum = max(x, current_sum + x)"
  - "This decides whether to extend the existing subarray or start a new one at x"
  - "Update best_sum = max(best_sum, current_sum) at each step"
solution: |
  use std::io::{self, BufRead};

  fn max_subarray(arr: &[i64]) -> i64 {
      let mut current_sum = arr[0];
      let mut best_sum = arr[0];
      for &x in &arr[1..] {
          current_sum = x.max(current_sum + x);
          best_sum = best_sum.max(current_sum);
      }
      best_sum
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let _n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      println!("{}", max_subarray(&arr));
  }
