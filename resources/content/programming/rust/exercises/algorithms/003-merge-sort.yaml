hints:
  - "Base case: return if arr.len() <= 1"
  - "Split into two halves with arr.split_at(arr.len() / 2), recursively sort each"
  - "Merge by comparing the front elements of each sorted half, pushing the smaller one first"
solution: |
  use std::io::{self, BufRead};

  fn merge_sort(arr: Vec<i64>) -> Vec<i64> {
      if arr.len() <= 1 {
          return arr;
      }
      let mid = arr.len() / 2;
      let left  = merge_sort(arr[..mid].to_vec());
      let right = merge_sort(arr[mid..].to_vec());
      merge(left, right)
  }

  fn merge(left: Vec<i64>, right: Vec<i64>) -> Vec<i64> {
      let mut result = Vec::with_capacity(left.len() + right.len());
      let (mut i, mut j) = (0, 0);
      while i < left.len() && j < right.len() {
          if left[i] <= right[j] {
              result.push(left[i]);
              i += 1;
          } else {
              result.push(right[j]);
              j += 1;
          }
      }
      result.extend_from_slice(&left[i..]);
      result.extend_from_slice(&right[j..]);
      result
  }

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines().map(|l| l.unwrap()).filter(|l| !l.is_empty());
      let _n: usize = lines.next().unwrap().trim().parse().unwrap();
      let arr: Vec<i64> = lines.next().unwrap().trim().split_whitespace().map(|x| x.parse().unwrap()).collect();
      let sorted = merge_sort(arr);
      let result: Vec<String> = sorted.iter().map(|x| x.to_string()).collect();
      println!("{}", result.join(" "));
  }
