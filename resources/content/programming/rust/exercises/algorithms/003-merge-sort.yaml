id: rust-algorithms-003
title: "Merge Sort"
difficulty: 2
tags: [merge-sort, sorting, divide-and-conquer, algorithms, rust]
description: |
  Implement merge sort to sort an array of integers.

  Read N on the first line, then N integers on the second line.
  Print the sorted integers on one line separated by spaces.
starter_code: |
  use std::io::{self, BufRead};

  fn merge_sort(arr: Vec<i64>) -> Vec<i64> {
