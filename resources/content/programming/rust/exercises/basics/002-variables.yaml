id: rust-basics-002
title: "Variables and Mutability"
difficulty: 1
tags: [variables, let, mut, types]
description: |
  Write a Rust program that:
  1. Declares an immutable variable x = 10
  2. Declares a mutable variable y = 5
  3. Increments y by 3
  4. Prints: "x=10, y=8"
starter_code: |
  fn main() {
      // declare x and y, increment y, then print
  }
test_cases:
  - input: ""
    expected_output: "x=10, y=8\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Use 'let x = 10;' for immutable"
  - "Use 'let mut y = 5;' for mutable"
  - "Use 'y += 3;' to increment"
  - "Use println!(\"x={}, y={}\", x, y)"
solution: |
  fn main() {
      let x = 10;
      let mut y = 5;
      y += 3;
      println!("x={}, y={}", x, y);
  }
metadata:
  version: "1.0.0"
  content_version: 1
  module: programming
  language: rust
  category: basics
