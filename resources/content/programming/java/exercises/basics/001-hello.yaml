id: java-basics-001
title: "Hello, World!"
difficulty: 1
tags: [basics, output, System.out]
description: |
  Write a Java program that prints exactly:
  Hello, World!
starter_code: |
  public class Main {
      public static void main(String[] args) {
          // your code here
      }
  }
test_cases:
  - input: ""
    expected_output: "Hello, World!\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Use System.out.println() to print with a newline"
  - "The class must be named 'Main' to match the filename"
solution: |
  public class Main {
      public static void main(String[] args) {
          System.out.println("Hello, World!");
      }
  }
