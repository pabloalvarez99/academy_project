id: java-basics-003
title: "Fibonacci Sequence"
difficulty: 2
tags: [fibonacci, loops, arrays]
description: |
  Write a Java program that reads an integer N from stdin and prints the first N
  Fibonacci numbers separated by spaces.

  F(1)=1, F(2)=1, F(3)=2, F(4)=3, F(5)=5, ...

  Example:
    Input:  5
    Output: 1 1 2 3 5
starter_code: |
  import java.util.Scanner;

  public class Main {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          // print first n fibonacci numbers separated by spaces
      }
  }
test_cases:
  - input: "1\n"
    expected_output: "1\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "5\n"
    expected_output: "1 1 2 3 5\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "8\n"
    expected_output: "1 1 2 3 5 8 13 21\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Use two variables to track the previous two Fibonacci numbers"
  - "Use StringBuilder or String.join to build the output"
  - "Don't print a trailing space — join with ' '"
solution: |
  import java.util.Scanner;
  import java.util.ArrayList;
  import java.util.List;

  public class Main {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          List<String> fibs = new ArrayList<>();
          long a = 1, b = 1;
          for (int i = 0; i < n; i++) {
              fibs.add(String.valueOf(a));
              long tmp = a + b;
              a = b;
              b = tmp;
          }
          System.out.println(String.join(" ", fibs));
      }
  }
