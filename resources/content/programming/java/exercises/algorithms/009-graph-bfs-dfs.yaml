id: java-algorithms-009
title: "Graph BFS and DFS"
difficulty: 3
tags: [graph, bfs, dfs, adjacency-list, traversal]
description: |
  Implement BFS and DFS traversal on an undirected graph represented as an adjacency list.

  Input:
    V E         (vertices 0..V-1, E edges)
    E lines of "u v" (undirected edges)
    bfs START   or   dfs START

  Output: visited nodes in traversal order, space-separated.

  For BFS: use a queue (FIFO) — visit level by level.
  For DFS: use a stack (iterative) — visit depth-first.
  When multiple neighbors to explore, process them in ascending order (sorted adjacency lists).
starter_code: |
  import java.util.*;

  public class Main {
      static List<List<Integer>> adj;
      static int V;

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          V = sc.nextInt();
          int E = sc.nextInt();

          adj = new ArrayList<>();
          for (int i = 0; i < V; i++) adj.add(new ArrayList<>());

          for (int i = 0; i < E; i++) {
              int u = sc.nextInt(), v = sc.nextInt();
              adj.get(u).add(v);
              adj.get(v).add(u);
          }
          for (List<Integer> neighbors : adj) Collections.sort(neighbors);

          String mode = sc.next();
          int start = sc.nextInt();

          List<Integer> result = mode.equals("bfs") ? bfs(start) : dfs(start);
          StringBuilder sb = new StringBuilder();
          for (int i = 0; i < result.size(); i++) {
              if (i > 0) sb.append(' ');
              sb.append(result.get(i));
          }
          System.out.println(sb);
      }

      static List<Integer> bfs(int start) {
          List<Integer> visited = new ArrayList<>();
          boolean[] seen = new boolean[V];
          Queue<Integer> queue = new LinkedList<>();
          queue.add(start);
          seen[start] = true;
          while (!queue.isEmpty()) {
              int node = queue.poll();
              visited.add(node);
              for (int neighbor : adj.get(node)) {
                  if (!seen[neighbor]) {
                      seen[neighbor] = true;
                      queue.add(neighbor);
                  }
              }
          }
          return visited;
      }

      static List<Integer> dfs(int start) {
          List<Integer> visited = new ArrayList<>();
          boolean[] seen = new boolean[V];
          Deque<Integer> stack = new ArrayDeque<>();
          stack.push(start);
          while (!stack.isEmpty()) {
              int node = stack.pop();
              if (seen[node]) continue;
              seen[node] = true;
              visited.add(node);
              // Push in reverse order so smallest is processed first
              List<Integer> neighbors = new ArrayList<>(adj.get(node));
              Collections.reverse(neighbors);
              for (int neighbor : neighbors) {
                  if (!seen[neighbor]) stack.push(neighbor);
              }
          }
          return visited;
      }
  }
