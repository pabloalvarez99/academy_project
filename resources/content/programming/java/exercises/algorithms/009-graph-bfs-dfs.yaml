hints:
  - "BFS: Queue (FIFO). Mark nodes visited when enqueued (not when dequeued) to avoid duplicates."
  - "DFS iterative: Stack (LIFO). Mark when popped, skip if already visited."
  - "Sort adjacency lists once after building the graph for deterministic order."
  - "BFS visits all nodes at distance k before any at distance k+1 (level-order)."
  - "DFS with iterative stack: push neighbors in reverse so smallest is on top."
solution: |
  import java.util.*;

  public class Main {
      static List<List<Integer>> adj;
      static int V;

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          V = sc.nextInt(); int E = sc.nextInt();
          adj = new ArrayList<>();
          for (int i = 0; i < V; i++) adj.add(new ArrayList<>());
          for (int i = 0; i < E; i++) {
              int u = sc.nextInt(), v = sc.nextInt();
              adj.get(u).add(v); adj.get(v).add(u);
          }
          for (List<Integer> n : adj) Collections.sort(n);
          String mode = sc.next(); int start = sc.nextInt();
          List<Integer> result = mode.equals("bfs") ? bfs(start) : dfs(start);
          StringBuilder sb = new StringBuilder();
          for (int i = 0; i < result.size(); i++) {
              if (i > 0) sb.append(' '); sb.append(result.get(i));
          }
          System.out.println(sb);
      }

      static List<Integer> bfs(int start) {
          List<Integer> visited = new ArrayList<>();
          boolean[] seen = new boolean[V];
          Queue<Integer> q = new LinkedList<>();
          q.add(start); seen[start] = true;
          while (!q.isEmpty()) {
              int node = q.poll(); visited.add(node);
              for (int nb : adj.get(node)) if (!seen[nb]) { seen[nb] = true; q.add(nb); }
          }
          return visited;
      }

      static List<Integer> dfs(int start) {
          List<Integer> visited = new ArrayList<>();
          boolean[] seen = new boolean[V];
          Deque<Integer> stack = new ArrayDeque<>();
          stack.push(start);
          while (!stack.isEmpty()) {
              int node = stack.pop();
              if (seen[node]) continue;
              seen[node] = true; visited.add(node);
              List<Integer> nb = new ArrayList<>(adj.get(node));
              Collections.reverse(nb);
              for (int n : nb) if (!seen[n]) stack.push(n);
          }
          return visited;
      }
  }
