hints:
  - "Predicate<String> lengthFilter = word -> word.length() > 4;"
  - "Function<String, String> toUpper = String::toUpperCase;"
  - "Consumer<String> printer = System.out::println;"
  - "Function.andThen(consumer) is not valid — apply them separately or use toUpper.apply(word) then printer.accept(result)"
  - "Alternatively: printer.accept(toUpper.apply(word)) inside the if block"
solution: |
  import java.util.*;
  import java.util.function.*;

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          List<String> words = new ArrayList<>();
          for (int i = 0; i < n; i++) words.add(sc.nextLine().trim());

          Predicate<String> lengthFilter = word -> word.length() > 4;
          Function<String, String> toUpper = String::toUpperCase;
          Consumer<String> printer = System.out::println;

          for (String word : words) {
              if (lengthFilter.test(word)) {
                  printer.accept(toUpper.apply(word));
              }
          }
      }
  }
