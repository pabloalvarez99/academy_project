id: java-algorithms-016
title: "Functional Interfaces Pipeline"
difficulty: 2
tags: [functional, lambda, java, predicate, function, consumer]
description: |
  Build a word-processing pipeline using Java's built-in functional interfaces.

  Read N words (one per line), then process each through this pipeline:
    1. Predicate<String>: keep only words with length > 4
    2. Function<String, String>: transform to uppercase
    3. Consumer<String>: print the result

  Words that do not pass the predicate are silently skipped.

  Input:
    N
    N lines each containing one word

  Output: filtered and transformed words, one per line, in original order.
starter_code: |
  import java.util.*;
  import java.util.function.*;

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          List<String> words = new ArrayList<>();
          for (int i = 0; i < n; i++) words.add(sc.nextLine().trim());

          Predicate<String> lengthFilter = // length > 4
          Function<String, String> toUpper = // toUpperCase
          Consumer<String> printer = // println

          for (String word : words) {
              if (lengthFilter.test(word)) {
                  toUpper.andThen(printer).accept(word);
              }
          }
      }
  }
