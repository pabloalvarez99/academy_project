  - "IntStream.of(nums).boxed().sorted(Comparator.reverseOrder()).limit(3).map(String::valueOf).collect(Collectors.joining(\" \"))"
  - "IntStream.of(nums).filter(x -> x%2!=0).average() returns OptionalDouble"
solution: |
  import java.util.*;
  import java.util.stream.*;

  public class Main {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          int[] nums = new int[n];
          for (int i = 0; i < n; i++) nums[i] = sc.nextInt();

          long sumSqEvens = IntStream.of(nums)
              .filter(x -> x % 2 == 0)
              .mapToLong(x -> (long) x * x)
              .sum();

          String top3 = IntStream.of(nums)
              .boxed()
              .sorted(Comparator.reverseOrder())
              .limit(3)
              .map(String::valueOf)
              .collect(Collectors.joining(" "));

          OptionalDouble avgOdds = IntStream.of(nums)
              .filter(x -> x % 2 != 0)
              .average();

          System.out.println(sumSqEvens);
          System.out.println(top3);
          System.out.println(avgOdds.isPresent() ? String.format("%.2f", avgOdds.getAsDouble()) : "none");
      }
  }
