  Practice Java Streams. Given N integers:
  1. Print the sum of squares of all even numbers
  2. Print the 3 largest numbers (descending), space-separated
  3. Print the average of odd numbers (2 decimal places), or "none" if no odds

  Input:
    Line 1: N
    Line 2: space-separated integers

  Example:
    Input: 6 / 1 2 3 4 5 6
    Output:
      56      (2²+4²+6²=4+16+36=56)
      6 5 4
      3.00    ((1+3+5)/3)
