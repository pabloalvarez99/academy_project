id: java-algorithms-017
title: "Tower of Hanoi"
difficulty: 2
tags: [recursion, java, algorithms, divide-and-conquer]
description: |
  Solve the Tower of Hanoi puzzle recursively for N disks using three pegs: A, B, C.

  Rules:
    - Move all disks from peg A to peg C using peg B as auxiliary.
    - Only one disk may be moved at a time.
    - A larger disk may never be placed on a smaller disk.

  Print each move as: "Move disk D from X to Y"
  where D is the disk number (1 = smallest, N = largest).
  After all moves, print: "Total moves: M" where M = 2^N - 1.

  Input:
    N (number of disks, 1 <= N <= 10)

  Output: each move on its own line, then the total move count.
starter_code: |
