hints:
  - "Base case: if disk == 1, print the move and increment moveCount, then return"
  - "Recursive case: move N-1 disks from source to aux, then move disk N, then move N-1 disks from aux to destination"
  - "hanoi(disk - 1, from, aux, to) moves the top N-1 disks out of the way"
  - "Total moves for N disks is always 2^N - 1 (you can verify with Math.pow(2, n) - 1)"
solution: |
  import java.util.Scanner;

  public class Solution {
      static int moveCount = 0;

      static void hanoi(int disk, String from, String to, String aux) {
          if (disk == 1) {
              System.out.println("Move disk 1 from " + from + " to " + to);
              moveCount++;
              return;
          }
          hanoi(disk - 1, from, aux, to);
          System.out.println("Move disk " + disk + " from " + from + " to " + to);
          moveCount++;
          hanoi(disk - 1, aux, to, from);
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          hanoi(n, "A", "C", "B");
          System.out.println("Total moves: " + moveCount);
      }
  }
