id: java-algorithms-013
title: "Optional Chaining"
difficulty: 1
tags: [optional, java, functional, null-safety]
description: |
  Use Optional<T> to safely chain operations on potentially-null input.

  Read N lines. Each line is either a string value or the literal word "null".
  For each line:
    - If the value is "null", treat it as an absent Optional.
    - Otherwise, wrap it in an Optional, trim whitespace, convert to uppercase.
    - Print the result, or print "empty" if the Optional is absent.

  Input:
    N
    N lines (each is a string or "null")

  Output: transformed string or "empty", one per line.
starter_code: |
  import java.util.*;

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          for (int i = 0; i < n; i++) {
              String line = sc.nextLine();
              Optional<String> opt = line.equals("null") ? Optional.empty() : Optional.of(line);
              // chain: trim, toUpperCase, then print or "empty"
          }
      }
  }
test_cases:
  - input: "3\nhello world\nnull\n  java  \n"
    expected_output: "HELLO WORLD\nempty\nJAVA\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "2\nnull\nOpenAI\n"
    expected_output: "empty\nOPENAI\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "4\n  trim me  \nnull\nfoo\nnull\n"
    expected_output: "TRIM ME\nempty\nFOO\nempty\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
hints:
  - "Optional.of(value) wraps a non-null value; Optional.empty() represents absence"
  - "opt.map(String::trim).map(String::toUpperCase) chains transformations safely"
  - "opt.orElse(\"empty\") returns the value or the fallback string"
  - "Chain all three: opt.map(String::trim).map(String::toUpperCase).orElse(\"empty\")"
solution: |
  import java.util.*;

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          for (int i = 0; i < n; i++) {
              String line = sc.nextLine();
              Optional<String> opt = line.equals("null") ? Optional.empty() : Optional.of(line);
              String result = opt.map(String::trim).map(String::toUpperCase).orElse("empty");
              System.out.println(result);
          }
      }
  }
