hints:
  - "dp[i][w] = max value using first i items with capacity w"
  - "If weights[i-1] > w: dp[i][w] = dp[i-1][w] (can't take item i)"
  - "Else: dp[i][w] = max(dp[i-1][w], dp[i-1][w-weights[i-1]] + values[i-1])"
  - "Base case: dp[0][w] = 0 for all w (no items = no value)"
solution: |
  import java.util.Scanner;

  public class Main {
      static int knapsack(int[] weights, int[] values, int W) {
          int n = weights.length;
          int[][] dp = new int[n + 1][W + 1];
          for (int i = 1; i <= n; i++) {
              for (int w = 0; w <= W; w++) {
                  dp[i][w] = dp[i-1][w];
                  if (weights[i-1] <= w) {
                      dp[i][w] = Math.max(dp[i][w], dp[i-1][w-weights[i-1]] + values[i-1]);
                  }
              }
          }
          return dp[n][W];
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt(), W = sc.nextInt();
          int[] weights = new int[n], values = new int[n];
          for (int i = 0; i < n; i++) {
              weights[i] = sc.nextInt();
              values[i] = sc.nextInt();
          }
          System.out.println(knapsack(weights, values, W));
      }
  }
