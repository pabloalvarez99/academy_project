id: java-algorithms-006
title: "0/1 Knapsack (Dynamic Programming)"
difficulty: 4
tags: [dynamic-programming, knapsack, dp, algorithms]
description: |
  Classic 0/1 Knapsack: given N items each with a weight and value, and a knapsack
  with capacity W, find the maximum total value without exceeding capacity.
  Each item can be taken at most once.

  Input:
    Line 1: N W (items, capacity)
    Next N lines: weight value

  Example:
    4 7
    1 1
    3 4
    4 5
    5 7
    → 9 (take items 1+2: weight 1+3=4, value 1+4=5... or 2+4: 3+4=7, value 4+7... wait: items 2,3: 3+4=7, value=4+5=9)
starter_code: |
  import java.util.Scanner;

  public class Main {
      static int knapsack(int[] weights, int[] values, int W) {
          int n = weights.length;
          int[][] dp = new int[n + 1][W + 1];
          // dp[i][w] = max value using first i items with capacity w
          return dp[n][W];
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt(), W = sc.nextInt();
          int[] weights = new int[n], values = new int[n];
          for (int i = 0; i < n; i++) {
              weights[i] = sc.nextInt();
              values[i] = sc.nextInt();
          }
          System.out.println(knapsack(weights, values, W));
      }
  }
test_cases:
