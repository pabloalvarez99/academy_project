id: java-algorithms-015
title: "Concurrent Counter"
difficulty: 3
tags: [concurrency, threads, atomic, java, synchronization]
description: |
  Implement a thread-safe counter using AtomicInteger.

  Spawn exactly 10 threads. Each thread increments a shared counter 1000 times.
  Use a CountDownLatch to wait for all threads to finish before printing the result.
  The final count must always be exactly 10000.

  Input: (none — read nothing from stdin)

  Output: a single line with the final counter value.

  Note: The program must work correctly regardless of thread scheduling. Using a
  plain int or non-atomic field will produce incorrect results due to race conditions.
