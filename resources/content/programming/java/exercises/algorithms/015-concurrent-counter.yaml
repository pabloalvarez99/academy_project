hints:
  - "AtomicInteger.incrementAndGet() is atomic — no synchronization block needed"
  - "Create a Runnable: for each thread, loop 1000 times calling counter.incrementAndGet()"
  - "Call latch.countDown() in the thread body after the loop (use try/finally if needed)"
  - "latch.await() in main blocks until all 10 countDown() calls have been made"
  - "new Thread(runnable).start() launches each thread"
solution: |
  import java.util.concurrent.*;
  import java.util.concurrent.atomic.*;

  public class Solution {
      public static void main(String[] args) throws InterruptedException {
          AtomicInteger counter = new AtomicInteger(0);
          CountDownLatch latch = new CountDownLatch(10);

          for (int i = 0; i < 10; i++) {
              new Thread(() -> {
                  try {
                      for (int j = 0; j < 1000; j++) {
                          counter.incrementAndGet();
                      }
                  } finally {
                      latch.countDown();
                  }
              }).start();
          }

          latch.await();
          System.out.println(counter.get());
      }
  }
