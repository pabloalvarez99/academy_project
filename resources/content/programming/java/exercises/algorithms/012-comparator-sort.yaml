hints:
  - "Use Comparator.comparingInt(p -> p.age).thenComparing(p -> p.name)"
  - "Collections.sort(people, comparator) or people.sort(comparator)"
  - "You can also use people.sort(Comparator.comparingInt((Person p) -> p.age).thenComparing(p -> p.name))"
solution: |
  import java.util.*;

  class Person {
      String name;
      int age;
      Person(String name, int age) { this.name = name; this.age = age; }
  }

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          List<Person> people = new ArrayList<>();
          for (int i = 0; i < n; i++) {
              String[] parts = sc.nextLine().trim().split(" ");
              people.add(new Person(parts[0], Integer.parseInt(parts[1])));
          }
          people.sort(Comparator.comparingInt((Person p) -> p.age).thenComparing(p -> p.name));
          for (Person p : people) {
              System.out.println(p.name + " " + p.age);
          }
      }
  }
