description: |
  Sort a list of Person objects by two criteria:
    1. Age ascending (younger first)
    2. Name alphabetically (A-Z) for ties in age

  Define a Person class with fields name (String) and age (int).

  Input:
    N
    N lines of "name age"

  Output: sorted persons, one per line as "name age".
