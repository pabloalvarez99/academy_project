id: java-algorithms-011
title: "Shape Factory Pattern"
difficulty: 2
tags: [design-patterns, factory, interfaces, java, oop]
description: |
  Implement a Shape factory using the Factory Pattern.

  Define a Shape interface with a method double area().
  Implement three shapes:
    - Circle: takes radius (double), area = PI * r^2
    - Rectangle: takes width and height (doubles), area = width * height
    - Triangle: takes base and height (doubles), area = 0.5 * base * height

  Implement ShapeFactory.create(String type, double... params) which returns the correct Shape.

  Input:
    N
    N lines of: "circle radius" or "rectangle width height" or "triangle base height"

  Output: area of each shape, formatted to 2 decimal places, one per line.
starter_code: |
  import java.util.Scanner;

  interface Shape {
      // implement here
  }

  class Circle implements Shape {
      // implement here
  }

  class Rectangle implements Shape {
      // implement here
  }

  class Triangle implements Shape {
      // implement here
  }

  class ShapeFactory {
      public static Shape create(String type, double... params) {
          // implement here
          return null;
      }
  }

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          for (int i = 0; i < n; i++) {
              String[] parts = sc.nextLine().trim().split(" ");
              String type = parts[0];
              double[] params = new double[parts.length - 1];
              for (int j = 0; j < params.length; j++) params[j] = Double.parseDouble(parts[j + 1]);
              Shape shape = ShapeFactory.create(type, params);
              System.out.printf("%.2f%n", shape.area());
          }
      }
  }
