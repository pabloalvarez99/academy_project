hints:
  - "interface Shape { double area(); }"
  - "Use Math.PI for circle area. Format with System.out.printf(\"%.2f%n\", area)"
  - "ShapeFactory.create() can switch on the type string to return the right implementation"
  - "varargs double... params lets you pass different numbers of arguments for each shape"
solution: |
  import java.util.Scanner;

  interface Shape {
      double area();
  }

  class Circle implements Shape {
      private final double radius;
      public Circle(double radius) { this.radius = radius; }
      @Override public double area() { return Math.PI * radius * radius; }
  }

  class Rectangle implements Shape {
      private final double width, height;
      public Rectangle(double width, double height) { this.width = width; this.height = height; }
      @Override public double area() { return width * height; }
  }

  class Triangle implements Shape {
      private final double base, height;
      public Triangle(double base, double height) { this.base = base; this.height = height; }
      @Override public double area() { return 0.5 * base * height; }
  }

  class ShapeFactory {
      public static Shape create(String type, double... params) {
          switch (type) {
              case "circle":    return new Circle(params[0]);
              case "rectangle": return new Rectangle(params[0], params[1]);
              case "triangle":  return new Triangle(params[0], params[1]);
              default: throw new IllegalArgumentException("Unknown shape: " + type);
          }
      }
  }

  public class Solution {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = Integer.parseInt(sc.nextLine().trim());
          for (int i = 0; i < n; i++) {
              String[] parts = sc.nextLine().trim().split(" ");
              String type = parts[0];
              double[] params = new double[parts.length - 1];
              for (int j = 0; j < params.length; j++) params[j] = Double.parseDouble(parts[j + 1]);
              Shape shape = ShapeFactory.create(type, params);
              System.out.printf("%.2f%n", shape.area());
          }
      }
  }
