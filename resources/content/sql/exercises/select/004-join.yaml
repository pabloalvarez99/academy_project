id: sql-select-004
title: "INNER JOIN"
difficulty: 2
tags: [join, inner-join, multi-table]
description: |
  Write a query that returns each order with the customer's name.
  Return columns: order id, customer name, order_date, amount.
  Order by orders.id ascending.
starter_code: |
  -- Join orders with customers

test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
solution: |
  SELECT o.id, c.name, o.order_date, o.amount
  FROM orders o
  INNER JOIN customers c ON o.customer_id = c.id
  ORDER BY o.id
