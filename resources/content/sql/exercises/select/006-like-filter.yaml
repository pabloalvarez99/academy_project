id: sql-select-006
title: "Filter with LIKE"
difficulty: 1
tags: [LIKE, WHERE, pattern-matching]
description: |
  Write a query that returns all products whose name contains "Widget" (case-sensitive).
  Show: id, name, price.
  Order by id ascending.

  Schema:
    products(id, name, price, stock)
starter_code: |
  -- Find products whose name contains "Widget"

solution: "SELECT id, name, price FROM products WHERE name LIKE '%Widget%' ORDER BY id"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use WHERE name LIKE '%Widget%'"
  - "% is a wildcard matching any sequence of characters"
