id: sql-select-009
title: "CTE — Running Total"
difficulty: 4
tags: [cte, window-functions, running-total, advanced]
description: |
  Use a Common Table Expression (CTE) and window function to compute a running total.

  Show each order date with: order_count that day, and cumulative_orders (running total
  from earliest date onward). Only include the first 10 distinct dates with orders.

  Order by order_date ascending.

  Expected columns: order_date, daily_orders, cumulative_orders
starter_code: |
  -- Schema is pre-loaded (orders)
  -- WITH cte AS (...) SELECT ... FROM cte
  -- SUM(daily_orders) OVER (ORDER BY order_date) gives running total
  WITH daily AS (
    SELECT
      order_date,
      COUNT(*) AS daily_orders
    FROM orders
    GROUP BY order_date
    ORDER BY order_date
    LIMIT 10
  )
  SELECT
    order_date,
    daily_orders,
    SUM(daily_orders) OVER (ORDER BY order_date) AS cumulative_orders
  FROM daily
  ORDER BY order_date;
test_cases:
  - input: ""
    expected_output: "order_date|daily_orders|cumulative_orders\n1996-07-04|1|1\n1996-07-05|2|3\n1996-07-08|1|4\n1996-07-09|2|6\n1996-07-10|1|7\n1996-07-11|2|9\n1996-07-12|1|10\n1996-07-15|2|12\n1996-07-16|1|13\n1996-07-17|2|15\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "CTEs use WITH name AS (SELECT ...) before the main query"
  - "SUM(col) OVER (ORDER BY date_col) computes cumulative sum"
  - "The window function runs AFTER the CTE is computed"
  - "LIMIT in the CTE restricts which dates appear; window then accumulates over those"
solution: |
  WITH daily AS (
    SELECT
      order_date,
      COUNT(*) AS daily_orders
    FROM orders
    GROUP BY order_date
    ORDER BY order_date
    LIMIT 10
  )
  SELECT
    order_date,
    daily_orders,
    SUM(daily_orders) OVER (ORDER BY order_date) AS cumulative_orders
  FROM daily
  ORDER BY order_date;
