id: sql-join-002
title: "Top Spenders"
difficulty: 3
tags: [JOIN, GROUP BY, ORDER BY, SUM]
description: |
  Write a query that returns each customer's name and total spending (sum of their orders),
  ordered by total spending descending. Show only customers who have placed at least one order.

  Columns: name, total_spent

  Schema:
    customers(id, name, city, country)
    orders(id, customer_id, order_date, amount)
starter_code: |
  -- Customer name and total spending, highest first

solution: "SELECT c.name, SUM(o.amount) AS total_spent FROM customers c JOIN orders o ON c.id = o.customer_id GROUP BY c.id, c.name ORDER BY total_spent DESC"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "JOIN customers with orders"
  - "GROUP BY c.id, c.name to aggregate per customer"
  - "SUM(o.amount) AS total_spent"
  - "ORDER BY total_spent DESC"
