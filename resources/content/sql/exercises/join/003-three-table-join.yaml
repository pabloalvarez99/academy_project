id: sql-join-003
title: "Three-Table JOIN"
difficulty: 3
tags: [join, multi-table, inner-join]
description: |
  Real queries often span multiple tables. Chain multiple JOINs to bring together data
  from orders, customers, and shippers.

  List each order showing: order_id, customer_name (company_name), and shipper_name.
  Order by order_id ascending. Limit to the first 10 rows.

  Expected columns: order_id, customer_name, shipper_name
starter_code: |
  -- Schema is pre-loaded (customers, orders, products, order_details, employees, shippers)
  SELECT
    o.id          AS order_id,
    c.company_name AS customer_name,
    s.name         AS shipper_name
  FROM orders o
  -- join customers and shippers here
  ORDER BY o.id
  LIMIT 10;
test_cases:
  - input: ""
    expected_output: "order_id|customer_name|shipper_name\n10248|Wilman Kala|Federal Shipping\n10249|Tradição Hipermercados|Speedy Express\n10250|Hanari Carnes|United Package\n10251|Victuailles en stock|Speedy Express\n10252|Suprêmes délices|United Package\n10253|Hanari Carnes|United Package\n10254|Chop-suey Chinese|United Package\n10255|Richter Supermarkt|Federal Shipping\n10256|Wellington Importadora|United Package\n10257|HILARION-Abastos|Federal Shipping\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "JOIN customers c ON o.customer_id = c.id"
  - "JOIN shippers s ON o.ship_via = s.id"
  - "Each JOIN adds a new table — alias them for readability"
  - "The order of JOINs doesn't affect results but can affect readability"
solution: |
  SELECT
    o.id          AS order_id,
    c.company_name AS customer_name,
    s.name         AS shipper_name
  FROM orders o
  JOIN customers c ON o.customer_id = c.id
  JOIN shippers s ON o.ship_via = s.id
  ORDER BY o.id
  LIMIT 10;
