id: sql-aggregate-003
title: "Average Order Amount"
difficulty: 2
tags: [aggregate, AVG, GROUP BY]
description: |
  Write a query that returns the average order amount per customer.
  Show customer_id and avg_amount, ordered by customer_id ascending.

  Schema:
    orders(id, customer_id, order_date, amount)
starter_code: |
  -- Average order amount per customer, ordered by customer_id

solution: "SELECT customer_id, AVG(amount) AS avg_amount FROM orders GROUP BY customer_id ORDER BY customer_id"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use GROUP BY customer_id to group per customer"
  - "Use AVG(amount) AS avg_amount"
  - "Add ORDER BY customer_id at the end"
