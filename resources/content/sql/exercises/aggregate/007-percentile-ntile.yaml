id: sql-aggregate-007
title: "NTILE and Percentile Buckets"
difficulty: 4
tags: [window-functions, ntile, analytics, advanced]
description: |
  NTILE(n) divides rows into n equal buckets and assigns each row a bucket number.

  Assign each product to one of 4 price quartiles (1=cheapest, 4=most expensive).
  Show product_name, unit_price, and price_quartile.
  Order by price_quartile then product_name.
  Show first 12 rows.

  Expected columns: product_name, unit_price, price_quartile
starter_code: |
  -- Schema is pre-loaded (products)
  SELECT
    product_name,
    unit_price,
    NTILE(4) OVER (ORDER BY unit_price) AS price_quartile
  FROM products
  ORDER BY price_quartile, product_name
  LIMIT 12;
test_cases:
  - input: ""
    expected_output: "product_name|unit_price|price_quartile\nGeitost|2.5|1\nKonbu|6.0|1\nFilo Mix|7.0|1\nTouртière|7.45|1\nTunnbröd|9.0|1\nAnchor Seafood|9.2|1\nChocolade|12.75|1\nRhönbräu Klosterbier|7.75|1\nSir Rodney's Scones|10.0|1\nChef Anton's Cajun Seasoning|22.0|2\nAniseed Syrup|10.0|2\nBoston Crab Meat|18.4|2\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "NTILE(4) OVER (ORDER BY unit_price) assigns 1 to cheapest 25%, 4 to most expensive 25%"
  - "This is a window function — no GROUP BY needed, all rows are kept"
  - "Wrap in CTE or use directly in ORDER BY"
solution: |
  SELECT
    product_name,
    unit_price,
    NTILE(4) OVER (ORDER BY unit_price) AS price_quartile
  FROM products
  ORDER BY price_quartile, product_name
  LIMIT 12;
