id: sql-aggregate-004
title: "Customers Per Country"
difficulty: 2
tags: [GROUP BY, COUNT, aggregate]
description: |
  Write a query that returns the number of customers in each country.
  Show: country, customer_count.
  Order by customer_count descending, then country ascending.

  Schema:
    customers(id, name, city, country)
starter_code: |
  -- Count customers per country, ordered by count desc then country asc

solution: "SELECT country, COUNT(*) AS customer_count FROM customers GROUP BY country ORDER BY customer_count DESC, country ASC"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "GROUP BY country"
  - "COUNT(*) AS customer_count"
  - "ORDER BY customer_count DESC, country ASC"
