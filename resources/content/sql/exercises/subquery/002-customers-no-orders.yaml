id: sql-subquery-002
title: "Customers With No Orders"
difficulty: 3
tags: [subquery, NOT IN, LEFT JOIN]
description: |
  Write a query that returns customers who have never placed an order.
  Show: id, name.
  Order by id ascending.

  Schema:
    customers(id, name, city, country)
    orders(id, customer_id, order_date, amount)
starter_code: |
  -- Customers who have no orders (use NOT IN or LEFT JOIN)

solution: "SELECT id, name FROM customers WHERE id NOT IN (SELECT customer_id FROM orders) ORDER BY id"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Approach 1: WHERE id NOT IN (SELECT customer_id FROM orders)"
  - "Approach 2: LEFT JOIN orders ON customers.id = orders.customer_id WHERE orders.id IS NULL"
