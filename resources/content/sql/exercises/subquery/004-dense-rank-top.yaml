id: sql-subquery-004
title: "DENSE_RANK — Top N Per Group"
difficulty: 4
tags: [window-functions, dense-rank, top-n, advanced]
description: |
  DENSE_RANK() is like RANK() but without gaps — ties get same rank, next rank increments by 1.

  Find the top 2 most expensive products in EACH category.
  Show: category_name, product_name, unit_price, dense_rank.
  Order by category_name, then dense_rank.

  Expected columns: category_name, product_name, unit_price, price_rank
starter_code: |
  -- Schema is pre-loaded (products, categories)
  -- DENSE_RANK() OVER (PARTITION BY ... ORDER BY ...) ranks within each partition
  WITH ranked AS (
    SELECT
      c.category_name,
      p.product_name,
      p.unit_price,
      DENSE_RANK() OVER (
        PARTITION BY p.category_id
        ORDER BY p.unit_price DESC
      ) AS price_rank
    FROM products p
    JOIN categories c ON p.category_id = c.id
  )
  SELECT category_name, product_name, unit_price, price_rank
  FROM ranked
  WHERE price_rank <= 2
  ORDER BY category_name, price_rank;
test_cases:
  - input: ""
    expected_output: "category_name|product_name|unit_price|price_rank\nBeverages|Côte de Blaye|263.5|1\nBeverages|Ipoh Coffee|46.0|2\nCondiments|Vegie-spread|43.9|1\nCondiments|Sirop d'érable|28.5|2\nConfections|Sir Rodney's Marmalade|81.0|1\nConfections|Tarte au sucre|49.3|2\nDairy Products|Raclette Courdavault|55.0|1\nDairy Products|Camembert Pierrot|34.0|2\nGrains/Cereals|Gnocchi di nonna Alice|38.0|1\nGrains/Cereals|Wimmers gute Semmelknödel|33.25|2\nMeat/Poultry|Thüringer Rostbratwurst|123.79|1\nMeat/Poultry|Mishi Kobe Niku|97.0|2\nProduce|Manjimup Dried Apples|53.0|1\nProduce|Tofu|23.25|2\nSeafood|Carnarvon Tigers|62.5|1\nSeafood|Röd Kaviar|15.0|2\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Use CTE + DENSE_RANK() OVER (PARTITION BY category ORDER BY price DESC)"
  - "DENSE_RANK vs RANK: [100,100,50] → DENSE_RANK=[1,1,2], RANK=[1,1,3]"
  - "Filter with WHERE price_rank <= 2 in outer query"
solution: |
  WITH ranked AS (
    SELECT
      c.category_name,
      p.product_name,
      p.unit_price,
      DENSE_RANK() OVER (
        PARTITION BY p.category_id
        ORDER BY p.unit_price DESC
      ) AS price_rank
    FROM products p
    JOIN categories c ON p.category_id = c.id
  )
  SELECT category_name, product_name, unit_price, price_rank
  FROM ranked
  WHERE price_rank <= 2
  ORDER BY category_name, price_rank;
