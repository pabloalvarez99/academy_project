id: sql-subquery-003
title: "Products Above Category Average"
difficulty: 4
tags: [subquery, correlated, aggregate, advanced]
description: |
  Find products whose unit_price is above the average price of their own category.
  This requires a correlated subquery — the subquery references the outer query.

  Return product_name and unit_price, ordered by unit_price descending.

  Expected columns: product_name, unit_price
starter_code: |
  -- Schema is pre-loaded (products, categories)
  -- Hint: use a correlated subquery in WHERE clause
  -- WHERE p.unit_price > (SELECT AVG(...) FROM products p2 WHERE p2.category_id = p.category_id)
  SELECT
    p.product_name,
    p.unit_price
  FROM products p
  -- add correlated subquery condition
  ORDER BY p.unit_price DESC;
test_cases:
  - input: ""
    expected_output: "product_name|unit_price\nCôte de Blaye|263.5\nThüringer Rostbratwurst|123.79\nMishi Kobe Niku|97.0\nSir Rodney's Marmalade|81.0\nCarnarvon Tigers|62.5\nRaclette Courdavault|55.0\nManjimup Dried Apples|53.0\nTarte au sucre|49.3\nIpoh Coffee|46.0\nRossle Sauerkraut|45.6\nVegie-spread|43.9\nPâté chinois|24.0\nGnocchi di nonna Alice|38.0\nGudbrandsdalsost|36.0\nCamembert Pierrot|34.0\nGorgonzola Telino|12.5\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Correlated subquery: the inner SELECT references the outer table alias (p)"
  - "WHERE p.unit_price > (SELECT AVG(p2.unit_price) FROM products p2 WHERE p2.category_id = p.category_id)"
  - "This runs the subquery once per outer row — it 'correlates' the category"
  - "Alternative: use a CTE or derived table with pre-computed category averages (often faster)"
solution: |
  SELECT
    p.product_name,
    p.unit_price
  FROM products p
  WHERE p.unit_price > (
      SELECT AVG(p2.unit_price)
      FROM products p2
      WHERE p2.category_id = p.category_id
  )
  ORDER BY p.unit_price DESC;
