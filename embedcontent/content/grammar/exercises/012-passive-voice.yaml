id: grammar-passive-001
title: "Active vs Passive Voice"
difficulty: 3
tags: [passive-voice, active-voice, technical-writing]
description: |
  Technical writing is clearer in active voice. Rewrite the following passive
  sentences in active voice. The actor (subject) is provided in parentheses.

  ORIGINAL:
    "The bug was fixed by the developer. (The developer)
    The report was generated by the system. (The system)
    The deployment was approved by the team lead. (The team lead)
    Errors are logged by the application. (The application)"

  Type all four active-voice sentences, each on the same line as before.
starter_code: "The bug was fixed by the developer. The report was generated by the system. The deployment was approved by the team lead. Errors are logged by the application."
hints:
  - "Active: [Subject] [verb] [object]"
  - "'The developer fixed the bug.'"
  - "'The system generated the report.'"
  - "'The team lead approved the deployment.'"
  - "'The application logs errors.'"
solution: "The developer fixed the bug. The system generated the report. The team lead approved the deployment. The application logs errors."
