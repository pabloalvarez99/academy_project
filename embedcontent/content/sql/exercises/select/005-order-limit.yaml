id: sql-select-005
title: "Top 3 Most Expensive Products"
difficulty: 1
tags: [ORDER BY, LIMIT, select]
description: |
  Write a query that returns the top 3 most expensive products.
  Show: name and price.
  Order by price descending.

  Schema:
    products(id, name, price, stock)
starter_code: |
  -- Top 3 products by price

solution: "SELECT name, price FROM products ORDER BY price DESC LIMIT 3"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use ORDER BY price DESC"
  - "Use LIMIT 3 to restrict to top 3"
