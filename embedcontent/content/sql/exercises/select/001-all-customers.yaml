id: sql-select-001
title: "SELECT All Customers"
difficulty: 1
tags: [select, basics, all-columns]
description: |
  Write a query to retrieve all rows and all columns from the customers table.
  The result should be ordered by id (ascending).

  Schema available:
    customers(id, name, city, country)
    orders(id, customer_id, order_date, amount)
    products(id, name, price, stock)
starter_code: |
  -- Schema is pre-loaded (customers, orders, products tables)
  -- Write your query below:

test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
solution: "SELECT * FROM customers ORDER BY id"
