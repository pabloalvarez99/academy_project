id: sql-select-010
title: "Recursive CTE — Fibonacci and Hierarchy"
difficulty: 4
tags: [recursive-cte, with-recursive, hierarchy, fibonacci]
description: |
  Recursive CTEs enable querying hierarchical or iterative data.

  Syntax:
    WITH RECURSIVE cte AS (
      base_case
      UNION ALL
      recursive_case WHERE termination_condition
    )
    SELECT * FROM cte;

  Task 1: Generate the first 10 Fibonacci numbers using a recursive CTE.
    Columns: n (position 1-10), value
    Output: two columns, 10 rows

  Task 2: Given the employees table, find the full reporting chain from 'Dave' up to CEO.
    Columns: level (0=Dave, 1=Dave's manager, ...), name
    Order by level ascending.

  Separate the two result sets with a blank line.
setup_sql: |
  CREATE TABLE employees (
      id INTEGER PRIMARY KEY,
      name TEXT NOT NULL,
      manager_id INTEGER REFERENCES employees(id)
  );
  INSERT INTO employees VALUES
      (1, 'Alice', NULL),
      (2, 'Bob',   1),
      (3, 'Carol', 1),
      (4, 'Dave',  2);
solution_sql: |
  WITH RECURSIVE fib(n, a, b) AS (
      SELECT 1, 0, 1
      UNION ALL
      SELECT n+1, b, a+b FROM fib WHERE n < 10
  )
  SELECT n, a AS value FROM fib;

  WITH RECURSIVE chain(level, id, name, manager_id) AS (
      SELECT 0, id, name, manager_id FROM employees WHERE name = 'Dave'
      UNION ALL
      SELECT c.level+1, e.id, e.name, e.manager_id
      FROM employees e
      JOIN chain c ON e.id = c.manager_id
  )
  SELECT level, name FROM chain ORDER BY level;
expected_output: |
  n|value
  1|0
  2|1
  3|1
  4|2
  5|3
  6|5
  7|8
  8|13
  9|21
  10|34

  level|name
  0|Dave
  1|Bob
  2|Alice
test_cases:
  - input: ""
    expected_output: "n|value\n1|0\n2|1\n3|1\n4|2\n5|3\n6|5\n7|8\n8|13\n9|21\n10|34\n\nlevel|name\n0|Dave\n1|Bob\n2|Alice\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Recursive CTE: anchor SELECT initializes, UNION ALL recursive SELECT extends"
  - "Fibonacci: carry (a,b) forward: next row is (b, a+b)"
  - "Hierarchy: start at target node, JOIN employees ON e.id = c.manager_id to walk up"
  - "UNION ALL not UNION — allows duplicate values; terminates when no rows match"
  - "SQLite supports WITH RECURSIVE natively"
