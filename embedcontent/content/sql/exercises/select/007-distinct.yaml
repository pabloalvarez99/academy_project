id: sql-select-007
title: "DISTINCT Values"
difficulty: 1
tags: [select, distinct, deduplication]
description: |
  DISTINCT removes duplicate rows from your result set.

  Using the Northwind database, list all unique countries that appear
  in the customers table, sorted alphabetically.

  Expected columns: country
starter_code: |
  -- Schema is pre-loaded (customers, orders, products, employees, shippers)
  SELECT DISTINCT country
  FROM customers
  ORDER BY country;
test_cases:
  - input: ""
    expected_output: "country\nArgentina\nAustria\nBelgium\nBrazil\nCanada\nDenmark\nFinland\nFrance\nGermany\nIreland\nItaly\nMexico\nNorway\nPoland\nPortugal\nSpain\nSweden\nSwitzerland\nUK\nUSA\nVenezuela\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "DISTINCT keyword goes right after SELECT"
  - "It applies to the entire row (all selected columns combined)"
  - "ORDER BY country for alphabetical sort"
solution: |
  SELECT DISTINCT country
  FROM customers
  ORDER BY country;
