id: sql-select-008
title: "Window Functions — RANK"
difficulty: 4
tags: [window-functions, rank, advanced, analytics]
description: |
  Window functions operate on a set of rows related to the current row,
  without collapsing them into a single output row (unlike GROUP BY).

  Rank products within each category by unit_price descending.
  Show: category_name, product_name, unit_price, and rank within category.
  Filter to only show rank 1 (most expensive per category).
  Order by category_name.

  Expected columns: category_name, product_name, unit_price, price_rank
starter_code: |
  -- Schema is pre-loaded (products, categories)
  -- RANK() OVER (PARTITION BY ... ORDER BY ...) assigns ranks within each partition
  SELECT
    c.category_name,
    p.product_name,
    p.unit_price,
    RANK() OVER (
      PARTITION BY p.category_id
      ORDER BY p.unit_price DESC
    ) AS price_rank
  FROM products p
  JOIN categories c ON p.category_id = c.id
  -- wrap in subquery to filter rank = 1
  ORDER BY c.category_name;
test_cases:
  - input: ""
    expected_output: "category_name|product_name|unit_price|price_rank\nBeverages|Côte de Blaye|263.5|1\nCondiments|Vegie-spread|43.9|1\nConfections|Sir Rodney's Marmalade|81.0|1\nDairy Products|Raclette Courdavault|55.0|1\nGrains/Cereals|Gnocchi di nonna Alice|38.0|1\nMeat/Poultry|Thüringer Rostbratwurst|123.79|1\nProduce|Manjimup Dried Apples|53.0|1\nSeafood|Carnarvon Tigers|62.5|1\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "RANK() OVER (PARTITION BY category_id ORDER BY unit_price DESC) assigns rank 1 to highest price per category"
  - "Wrap the window query in a subquery or CTE: SELECT * FROM (...) WHERE price_rank = 1"
  - "WITH ranked AS (SELECT ..., RANK() OVER (...) AS price_rank FROM ...) SELECT ... FROM ranked WHERE price_rank = 1"
solution: |
  WITH ranked AS (
    SELECT
      c.category_name,
      p.product_name,
      p.unit_price,
      RANK() OVER (
        PARTITION BY p.category_id
        ORDER BY p.unit_price DESC
      ) AS price_rank
    FROM products p
    JOIN categories c ON p.category_id = c.id
  )
  SELECT category_name, product_name, unit_price, price_rank
  FROM ranked
  WHERE price_rank = 1
  ORDER BY category_name;
