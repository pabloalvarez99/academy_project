id: sql-aggregate-005
title: "HAVING Clause Filter"
difficulty: 3
tags: [aggregate, having, group-by, filter]
description: |
  The HAVING clause filters groups after aggregation (unlike WHERE which filters rows before).

  Using the Northwind database, find all countries that have more than 2 customers.
  Return country and customer_count, ordered by customer_count descending.

  Expected columns: country, customer_count
starter_code: |
  -- Schema is pre-loaded (customers, orders, products, employees, shippers)
  -- HAVING filters GROUPS, WHERE filters ROWS
  SELECT
    country,
    COUNT(*) AS customer_count
  FROM customers
  GROUP BY country
  -- add HAVING to filter groups with more than 2 customers
  ORDER BY customer_count DESC;
test_cases:
  - input: ""
    expected_output: "country|customer_count\nUSA|13\nGermany|11\nFrance|11\nBrazil|9\nUK|7\nMexico|5\nSpain|5\nArgentina|3\nAustria|3\nCanada|3\nPortugal|3\nVenezuela|3\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "GROUP BY country first, then HAVING COUNT(*) > 2"
  - "HAVING applies after GROUP BY — it filters aggregated results"
  - "Difference: WHERE filters individual rows; HAVING filters entire groups"
solution: |
  SELECT
    country,
    COUNT(*) AS customer_count
  FROM customers
  GROUP BY country
  HAVING COUNT(*) > 2
  ORDER BY customer_count DESC;
