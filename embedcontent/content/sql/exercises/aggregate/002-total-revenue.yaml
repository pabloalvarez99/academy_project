id: sql-aggregate-002
title: "Total Revenue"
difficulty: 1
tags: [aggregate, SUM, revenue]
description: |
  Write a query that returns the total sum of all order amounts.
  Name the result column "total_revenue".

  Schema:
    orders(id, customer_id, order_date, amount)
starter_code: |
  -- Sum all order amounts, alias as "total_revenue"

solution: "SELECT SUM(amount) AS total_revenue FROM orders"
