id: sql-aggregate-001
title: "Count All Customers"
difficulty: 1
tags: [aggregate, COUNT, basics]
description: |
  Write a query that returns the total number of customers in the customers table.
  Your result should have a single column named "total".

  Expected result:
    total
    -----
    5

  Schema:
    customers(id, name, city, country)
    orders(id, customer_id, order_date, amount)
    products(id, name, price, stock)
starter_code: |
  -- Count total customers, alias the column as "total"

solution: "SELECT COUNT(*) AS total FROM customers"
test_cases:
  - input: ""
    expected_output: ""
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use COUNT(*) to count all rows"
  - "Use AS to rename the column: COUNT(*) AS total"
metadata:
  version: "1.0.0"
  content_version: 1
  module: sql
  language: sql
  category: aggregate
