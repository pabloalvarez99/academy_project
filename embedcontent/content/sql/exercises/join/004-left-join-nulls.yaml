id: sql-join-004
title: "LEFT JOIN and NULL Handling"
difficulty: 2
tags: [join, left-join, null, coalesce]
description: |
  LEFT JOIN returns ALL rows from the left table, and matched rows from the right.
  Unmatched right-side columns are NULL.

  List all products and their category name. If a product somehow has no category,
  show "Unknown" instead of NULL.
  Order by product_name alphabetically. Show first 10.

  Expected columns: product_name, category_name
starter_code: |
  -- Schema is pre-loaded (products, categories)
  -- COALESCE(value, fallback) returns first non-NULL argument
  SELECT
    p.product_name,
    COALESCE(c.category_name, 'Unknown') AS category_name
  FROM products p
  LEFT JOIN categories c ON p.category_id = c.id
  ORDER BY p.product_name
  LIMIT 10;
test_cases:
  - input: ""
    expected_output: "product_name|category_name\nAlice Mutton|Meat/Poultry\nAniseed Syrup|Condiments\nBoston Crab Meat|Seafood\nCamembert Pierrot|Dairy Products\nCarnarvon Tigers|Seafood\nChef Anton's Cajun Seasoning|Condiments\nChef Anton's Gumbo Mix|Condiments\nChocolade|Confections\nCôte de Blaye|Beverages\nEscargots de Bourgogne|Seafood\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "LEFT JOIN ensures all products appear even if category_id is NULL"
  - "COALESCE returns first non-NULL argument: COALESCE(c.category_name, 'Unknown')"
  - "Difference: INNER JOIN would drop rows with no matching category"
solution: |
  SELECT
    p.product_name,
    COALESCE(c.category_name, 'Unknown') AS category_name
  FROM products p
  LEFT JOIN categories c ON p.category_id = c.id
  ORDER BY p.product_name
  LIMIT 10;
