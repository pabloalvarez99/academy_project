id: ts-basics-002
title: "Fibonacci Sequence"
difficulty: 2
tags: [fibonacci, generators, arrays]
description: |
  Write a TypeScript program that reads an integer N from stdin and prints the first N
  Fibonacci numbers separated by spaces.

  Example:
    Input:  5
    Output: 1 1 2 3 5
starter_code: |
  const lines: string[] = [];
  process.stdin.on('data', (d) => lines.push(...d.toString().split('\n')));
  process.stdin.on('end', () => {
      const n = parseInt(lines[0].trim());
      // compute and print first n fibonacci numbers separated by spaces
  });
test_cases:
  - input: "5\n"
    expected_output: "1 1 2 3 5\n"
    time_limit_ms: 8000
    memory_limit_kb: 131072
  - input: "1\n"
    expected_output: "1\n"
    time_limit_ms: 8000
    memory_limit_kb: 131072
  - input: "8\n"
    expected_output: "1 1 2 3 5 8 13 21\n"
    time_limit_ms: 8000
    memory_limit_kb: 131072
hints:
  - "Use two variables a=1, b=1 and swap each iteration"
  - "Collect into an array then console.log(arr.join(' '))"
solution: |
  const lines: string[] = [];
  process.stdin.on('data', (d) => lines.push(...d.toString().split('\n')));
  process.stdin.on('end', () => {
      const n = parseInt(lines[0].trim());
      const fibs: number[] = [];
      let a = 1, b = 1;
      for (let i = 0; i < n; i++) {
          fibs.push(a);
          [a, b] = [b, a + b];
      }
      console.log(fibs.join(' '));
  });
