hints:
  - "fibonacci_gen is already correct — it's an infinite generator using yield"
  - "running_average: yield total/count after each element (already correct in starter)"
  - "chunked: for i in range(0, len(lst), size): yield lst[i:i+size]"
  - "islice(gen, n) takes first n values from an infinite generator without consuming all"
solution: |
  import sys
  from itertools import islice

  def fibonacci_gen():
      a, b = 0, 1
      while True:
          yield a
          a, b = b, a + b

  def running_average(iterable):
      total, count = 0, 0
      for x in iterable:
          total += x
          count += 1
          yield total / count

  def chunked(iterable, size):
      lst = list(iterable)
      for i in range(0, len(lst), size):
          yield lst[i:i+size]

  parts = sys.stdin.read().split()
  cmd = parts[0]

  if cmd == 'fib':
      n = int(parts[1])
      for v in islice(fibonacci_gen(), n):
          print(v)
  elif cmd == 'avg':
      nums = list(map(float, parts[1:]))
      for avg in running_average(nums):
          print(f"{avg:.2f}")
  elif cmd == 'chunk':
      size = int(parts[1])
      nums = list(map(int, parts[2:]))
      for chunk in chunked(nums, size):
          print(' '.join(map(str, chunk)))
