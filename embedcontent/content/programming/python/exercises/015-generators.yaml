title: "Generators and Lazy Evaluation"
difficulty: 3
tags: [generators, yield, lazy-evaluation, itertools, python]
description: |
  Practice Python generators for memory-efficient iteration.

  Implement:
  1. fibonacci_gen(): infinite generator yielding Fibonacci numbers
  2. running_average(iterable): generator yielding running average after each element
  3. chunked(iterable, size): generator yielding successive chunks of given size

  Read a command and arguments, run the corresponding generator.

  Input format:
    fib N        → print first N Fibonacci numbers
    avg nums...  → print running average after each number (2 dp)
    chunk N nums → print chunks of size N from the numbers
