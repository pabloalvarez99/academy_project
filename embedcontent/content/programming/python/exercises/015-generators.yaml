  from itertools import islice

  def fibonacci_gen():
      a, b = 0, 1
      while True:
          yield a
          a, b = b, a + b

  def running_average(iterable):
      total, count = 0, 0
      for x in iterable:
          total += x
          count += 1
          yield total / count  # TODO: implement correctly

  def chunked(iterable, size):
      lst = list(iterable)
      # yield sub-lists of length size
      pass  # TODO

  parts = sys.stdin.read().split()
  cmd = parts[0]

  if cmd == 'fib':
      n = int(parts[1])
      for v in islice(fibonacci_gen(), n):
          print(v)
  elif cmd == 'avg':
      nums = list(map(float, parts[1:]))
      for avg in running_average(nums):
          print(f"{avg:.2f}")
  elif cmd == 'chunk':
      size = int(parts[1])
      nums = list(map(int, parts[2:]))
