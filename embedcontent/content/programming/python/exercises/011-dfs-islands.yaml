hints:
  - "DFS flood fill: when you find a '1', mark it '0' and recursively mark all connected '1's"
  - "Marking as '0' prevents revisiting — no separate visited set needed"
  - "Four directions: up (-1,0), down (+1,0), left (0,-1), right (0,+1)"
  - "Check bounds before recursing: 0 <= r < rows, 0 <= c < cols"
solution: |
  import sys
  sys.setrecursionlimit(10000)

  def num_islands(grid):
      if not grid:
          return 0
      rows, cols = len(grid), len(grid[0])
      count = 0

      def dfs(r, c):
          if r < 0 or r >= rows or c < 0 or c >= cols or grid[r][c] != '1':
              return
          grid[r][c] = '0'  # mark visited
          dfs(r+1, c); dfs(r-1, c); dfs(r, c+1); dfs(r, c-1)

      for r in range(rows):
          for c in range(cols):
              if grid[r][c] == '1':
                  count += 1
                  dfs(r, c)
      return count

  data = sys.stdin.read().split('\n')
  r, c = map(int, data[0].split())
  grid = [data[i+1].split() for i in range(r)]
  print(num_islands(grid))
