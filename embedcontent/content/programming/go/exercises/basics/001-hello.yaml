id: go-basics-001
title: "Hello, World!"
difficulty: 1
tags: [basics, output, fmt]
description: |
  Write a Go program that prints exactly:
  Hello, World!
starter_code: |
  package main

  func main() {
      // your code here
  }
test_cases:
  - input: ""
    expected_output: "Hello, World!\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "You need to import the fmt package"
  - "Use fmt.Println() to print with a newline"
solution: |
  package main

  import "fmt"

  func main() {
      fmt.Println("Hello, World!")
  }
metadata:
  version: "1.0.0"
  content_version: 1
  module: programming
  language: go
  category: basics
