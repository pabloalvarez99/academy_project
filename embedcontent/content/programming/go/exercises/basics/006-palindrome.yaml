id: go-basics-006
title: "Palindrome Check"
difficulty: 2
tags: [strings, palindrome, runes]
description: |
  Write a Go program that reads a word from stdin and prints "yes" if it is a palindrome
  (reads the same forwards and backwards, case-insensitive), or "no" otherwise.

  Examples:
    Input:  racecar  → Output: yes
    Input:  hello    → Output: no
    Input:  Madam    → Output: yes
starter_code: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
  )

  func main() {
      reader := bufio.NewReader(os.Stdin)
      word, _ := reader.ReadString('\n')
      // check if word is a palindrome and print "yes" or "no"
      _ = word
      fmt.Println("?")
  }
test_cases:
  - input: "racecar\n"
    expected_output: "yes\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "hello\n"
    expected_output: "no\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "Madam\n"
    expected_output: "yes\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Use strings.ToLower() and strings.TrimSpace() to normalize"
  - "Convert to []rune for Unicode safety"
  - "Compare runes[i] with runes[len-1-i]"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strings"
  )

  func main() {
      reader := bufio.NewReader(os.Stdin)
      word, _ := reader.ReadString('\n')
      s := []rune(strings.ToLower(strings.TrimSpace(word)))
      n := len(s)
      ok := true
      for i := 0; i < n/2; i++ {
          if s[i] != s[n-1-i] {
              ok = false
              break
          }
      }
      if ok {
          fmt.Println("yes")
      } else {
          fmt.Println("no")
      }
  }
