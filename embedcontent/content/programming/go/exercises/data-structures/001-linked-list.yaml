solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strconv"
      "strings"
  )

  type Node struct {
      Val  int
      Next *Node
  }

  func reverse(head *Node) *Node {
      var prev *Node
      curr := head
      for curr != nil {
          next := curr.Next
          curr.Next = prev
          prev = curr
          curr = next
      }
      return prev
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      n, _ := strconv.Atoi(strings.TrimSpace(line1))
      line2, _ := reader.ReadString('\n')
      parts := strings.Fields(strings.TrimSpace(line2))

      var head, tail *Node
      for i := 0; i < n; i++ {
          v, _ := strconv.Atoi(parts[i])
          node := &Node{Val: v}
          if head == nil {
              head = node
              tail = node
          } else {
              tail.Next = node
              tail = node
          }
      }

      head = reverse(head)
      result := []string{}
      for curr := head; curr != nil; curr = curr.Next {
          result = append(result, strconv.Itoa(curr.Val))
      }
      fmt.Println(strings.Join(result, " "))
  }
