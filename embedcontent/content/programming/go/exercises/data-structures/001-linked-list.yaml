description: |
  Implement a singly linked list and a function to reverse it.
  Read N integers, build the list, reverse it, then print the values space-separated.

  Input:
    Line 1: N
    Line 2: space-separated integers

  Example:
    5 numbers [1 2 3 4 5] → reversed: 5 4 3 2 1
