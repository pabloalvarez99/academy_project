id: go-algorithms-008
title: "Longest Common Subsequence"
difficulty: 4
tags: [dynamic-programming, strings, dp, lcs]
description: |
  Given two strings, find the length of their Longest Common Subsequence (LCS).
  A subsequence maintains relative order but doesn't need to be contiguous.

  Read two strings (one per line) and print the LCS length.

  Examples:
    "abcde" / "ace"    → 3 (LCS = "ace")
    "abc"   / "abc"    → 3
    "abc"   / "def"    → 0
    "AGGTAB" / "GXTXAYB" → 4 (LCS = "GTAB")
starter_code: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strings"
  )

  func lcs(a, b string) int {
      // 2D DP table: dp[i][j] = LCS of a[:i] and b[:j]
      return 0
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      a, _ := reader.ReadString('\n')
      b, _ := reader.ReadString('\n')
      a = strings.TrimSpace(a)
      b = strings.TrimSpace(b)
      fmt.Println(lcs(a, b))
  }
test_cases:
  - input: "abcde\nace\n"
    expected_output: "3\n"
    time_limit_ms: 5000
