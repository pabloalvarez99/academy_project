  - input: "abc\nabc\n"
    expected_output: "3\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "abc\ndef\n"
    expected_output: "0\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
  - input: "AGGTAB\nGXTXAYB\n"
    expected_output: "4\n"
    time_limit_ms: 5000
    memory_limit_kb: 65536
hints:
  - "Create a 2D table dp[m+1][n+1] where m=len(a), n=len(b)"
  - "Base case: dp[0][j] = 0 and dp[i][0] = 0 (empty string has LCS 0)"
  - "If a[i-1] == b[j-1]: dp[i][j] = dp[i-1][j-1] + 1"
  - "Else: dp[i][j] = max(dp[i-1][j], dp[i][j-1])"
  - "Answer is dp[m][n]"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "strings"
  )

  func lcs(a, b string) int {
      m, n := len(a), len(b)
      dp := make([][]int, m+1)
      for i := range dp {
          dp[i] = make([]int, n+1)
      }
      for i := 1; i <= m; i++ {
          for j := 1; j <= n; j++ {
              if a[i-1] == b[j-1] {
                  dp[i][j] = dp[i-1][j-1] + 1
              } else if dp[i-1][j] > dp[i][j-1] {
                  dp[i][j] = dp[i-1][j]
              } else {
                  dp[i][j] = dp[i][j-1]
              }
          }
      }
      return dp[m][n]
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      a, _ := reader.ReadString('\n')
      b, _ := reader.ReadString('\n')
      a = strings.TrimSpace(a)
      b = strings.TrimSpace(b)
      fmt.Println(lcs(a, b))
  }
