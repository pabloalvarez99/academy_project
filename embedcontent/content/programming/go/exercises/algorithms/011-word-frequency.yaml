solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "sort"
      "strings"
      "sync"
      "unicode"
  )

  type wordCount struct {
      word  string
      count int
  }

  func processLine(line string, ch chan<- wordCount, wg *sync.WaitGroup) {
      defer wg.Done()
      normalize := func(r rune) rune {
          if unicode.IsLetter(r) {
              return unicode.ToLower(r)
          }
          return ' '
      }
      clean := strings.Map(normalize, line)
      counts := make(map[string]int)
      for _, w := range strings.Fields(clean) {
          counts[w]++
      }
      for w, c := range counts {
          ch <- wordCount{w, c}
      }
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      n := 0
      fmt.Sscanf(strings.TrimSpace(line1), "%d", &n)

      ch := make(chan wordCount, 1000)
      var wg sync.WaitGroup

      for i := 0; i < n; i++ {
          line, _ := reader.ReadString('\n')
          wg.Add(1)
          go processLine(strings.TrimSpace(line), ch, &wg)
      }

      go func() {
          wg.Wait()
          close(ch)
      }()

      freq := make(map[string]int)
      for wc := range ch {
          freq[wc.word] += wc.count
      }

      type kv struct{ k string; v int }
      var pairs []kv
      for k, v := range freq {
          if v >= 2 {
              pairs = append(pairs, kv{k, v})
          }
      }
      sort.Slice(pairs, func(i, j int) bool {
          if pairs[i].v != pairs[j].v {
              return pairs[i].v > pairs[j].v
          }
          return pairs[i].k < pairs[j].k
      })
      for _, p := range pairs {
          fmt.Printf("%s %d\n", p.k, p.v)
      }
  }
