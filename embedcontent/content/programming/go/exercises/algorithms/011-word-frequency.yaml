id: go-algorithms-011
title: "Word Frequency with Goroutines"
difficulty: 4
tags: [goroutines, channels, concurrency, maps]
description: |
  Count word frequencies across multiple lines using goroutines.
  Each line is processed by a goroutine that sends (word, count) pairs
  to a channel. The main goroutine aggregates results.

  Read N lines, count all word frequencies (case-insensitive, ignore punctuation).
  Print: "word count" pairs sorted by count descending, then word ascending.
  Only print words with count >= 2. If none, print nothing.

  Input:
    Line 1: N
    Next N lines: text

  Example:
    3 lines:
      Go is great
      Go is fast
      Go channels work
    Output:
      go 3
      is 2
starter_code: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
      "sort"
      "strings"
      "sync"
      "unicode"
  )

  type wordCount struct {
      word  string
      count int
  }

  func processLine(line string, ch chan<- wordCount, wg *sync.WaitGroup) {
      defer wg.Done()
      // normalize: lowercase, split on non-alpha
      // send each word's count to ch
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      line1, _ := reader.ReadString('\n')
      n := 0
      fmt.Sscanf(strings.TrimSpace(line1), "%d", &n)

      ch := make(chan wordCount, 1000)
      var wg sync.WaitGroup

      for i := 0; i < n; i++ {
          line, _ := reader.ReadString('\n')
          wg.Add(1)
          go processLine(strings.TrimSpace(line), ch, &wg)
      }

      go func() {
          wg.Wait()
          close(ch)
      }()

      freq := make(map[string]int)
      for wc := range ch {
          freq[wc.word] += wc.count
      }

      // sort and print
      type kv struct{ k string; v int }
      var pairs []kv
      for k, v := range freq {
          if v >= 2 {
              pairs = append(pairs, kv{k, v})
          }
      }
      sort.Slice(pairs, func(i, j int) bool {
          if pairs[i].v != pairs[j].v {
              return pairs[i].v > pairs[j].v
          }
          return pairs[i].k < pairs[j].k
      })
      for _, p := range pairs {
          fmt.Printf("%s %d\n", p.k, p.v)
      }
  }
