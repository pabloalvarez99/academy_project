hints:
  - "Initialize dist[] with maxInt, dist[start]=0"
  - "Use heap.Push(pq, Item{0, start}) to seed the priority queue"
  - "Pop minimum-cost item; if cost > dist[node], skip (stale entry)"
  - "For each neighbor: if dist[node]+weight < dist[neighbor], update and push"
  - "Return dist[end], or -1 if dist[end] is still maxInt"
solution: |
  package main

  import (
      "bufio"
      "container/heap"
      "fmt"
      "os"
      "strings"
      "strconv"
  )

  type Item [2]int
  type PQ []Item

  func (pq PQ) Len() int            { return len(pq) }
  func (pq PQ) Less(i, j int) bool  { return pq[i][0] < pq[j][0] }
  func (pq PQ) Swap(i, j int)       { pq[i], pq[j] = pq[j], pq[i] }
  func (pq *PQ) Push(x interface{}) { *pq = append(*pq, x.(Item)) }
  func (pq *PQ) Pop() interface{}   { old := *pq; n := len(old); x := old[n-1]; *pq = old[:n-1]; return x }

  func dijkstra(graph [][]Item, start, end, V int) int {
      const inf = 1<<31 - 1
      dist := make([]int, V)
      for i := range dist { dist[i] = inf }
      dist[start] = 0

      pq := &PQ{Item{0, start}}
      heap.Init(pq)

      for pq.Len() > 0 {
          cur := heap.Pop(pq).(Item)
          cost, u := cur[0], cur[1]
          if cost > dist[u] { continue }
          for _, edge := range graph[u] {
              w, v := edge[0], edge[1]
              if dist[u]+w < dist[v] {
                  dist[v] = dist[u] + w
                  heap.Push(pq, Item{dist[v], v})
              }
          }
      }
      if dist[end] == inf { return -1 }
      return dist[end]
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      readLine := func() []string {
          line, _ := reader.ReadString('\n')
          return strings.Fields(strings.TrimSpace(line))
      }
      p := readLine()
      V, _ := strconv.Atoi(p[0])
      E, _ := strconv.Atoi(p[1])

      graph := make([][]Item, V)
      for i := range graph { graph[i] = []Item{} }

      for i := 0; i < E; i++ {
          f := readLine()
          u, _ := strconv.Atoi(f[0])
          v, _ := strconv.Atoi(f[1])
          w, _ := strconv.Atoi(f[2])
          graph[u] = append(graph[u], Item{w, v})
      }

      last := readLine()
      start, _ := strconv.Atoi(last[0])
      end, _ := strconv.Atoi(last[1])
      fmt.Println(dijkstra(graph, start, end, V))
  }
