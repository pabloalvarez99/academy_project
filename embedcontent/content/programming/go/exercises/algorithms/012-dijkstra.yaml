id: go-algorithms-012
title: "Dijkstra's Shortest Path"
difficulty: 5
tags: [graph, dijkstra, priority-queue, shortest-path]
description: |
  Find the shortest path between two nodes in a weighted directed graph
  using Dijkstra's algorithm.

  Input format:
    Line 1: V E (vertices 0..V-1, edges)
    Next E lines: u v w (directed edge u→v with weight w)
    Last line: start end

  Print the shortest distance, or -1 if unreachable.

  Example:
    5 6
    0 1 10
    0 2 3
    1 3 2
    2 1 4
    2 3 8
    3 4 5
    0 4 → 20 (0→2→1→3→4 = 3+4+2+5=14... actually: 0→2=3, 2→1=4+3=7, 1→3=7+2=9, 3→4=9+5=14)

