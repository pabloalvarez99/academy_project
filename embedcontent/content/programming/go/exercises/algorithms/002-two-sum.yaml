id: go-algorithms-002
title: "Two Sum"
difficulty: 2
tags: [algorithms, hashmap, arrays]
description: |
  Classic interview problem. Read N integers and a target T. Find two indices i and j
  such that nums[i] + nums[j] == T (i < j). Print "i j" (0-based). Guaranteed exactly
  one solution exists.

  Example:
    Input:
      4
      2 7 11 15
      9
    Output: 0 1   (because nums[0]+nums[1] = 2+7 = 9)
starter_code: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
  )

  func twoSum(nums []int, target int) (int, int) {
      // use a hashmap for O(n) solution
      return -1, -1
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      var n int
      fmt.Fscan(reader, &n)
      nums := make([]int, n)
      for i := range nums {
          fmt.Fscan(reader, &nums[i])
      }
      var target int
      fmt.Fscan(reader, &target)
      i, j := twoSum(nums, target)
      fmt.Println(i, j)
  }
test_cases:
  - input: "4\n2 7 11 15\n9\n"
    expected_output: "0 1\n"
    time_limit_ms: 5000
