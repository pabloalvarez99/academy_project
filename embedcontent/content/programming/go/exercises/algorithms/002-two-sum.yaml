hints:
  - "Use a map[int]int to store value → index"
  - "For each element, check if (target - element) exists in the map"
  - "If found, return the stored index and the current index"
  - "Otherwise store nums[i] → i in the map"
solution: |
  package main

  import (
      "bufio"
      "fmt"
      "os"
  )

  func twoSum(nums []int, target int) (int, int) {
      seen := make(map[int]int)
      for i, v := range nums {
          if j, ok := seen[target-v]; ok {
              return j, i
          }
          seen[v] = i
      }
      return -1, -1
  }

  func main() {
      reader := bufio.NewReader(os.Stdin)
      var n int
      fmt.Fscan(reader, &n)
      nums := make([]int, n)
      for i := range nums {
          fmt.Fscan(reader, &nums[i])
      }
      var target int
      fmt.Fscan(reader, &target)
      i, j := twoSum(nums, target)
      fmt.Println(i, j)
  }
