hints:
  - "BubbleSorter: nested loops, swap adjacent if out of order"
  - "SelectionSorter: find min in remaining, swap to front position"
  - "The Strategy pattern: client uses Sorter interface, swaps concrete implementation at runtime"
  - "Interface allows swapping algorithms without changing calling code"
solution: |
  import java.util.*;

  public class Main {
      interface Sorter {
          void sort(int[] arr);
      }

      static class BubbleSorter implements Sorter {
          public void sort(int[] arr) {
              int n = arr.length;
              for (int i = 0; i < n-1; i++) {
                  for (int j = 0; j < n-1-i; j++) {
                      if (arr[j] > arr[j+1]) {
                          int tmp = arr[j]; arr[j] = arr[j+1]; arr[j+1] = tmp;
                      }
                  }
              }
          }
      }

      static class SelectionSorter implements Sorter {
          public void sort(int[] arr) {
              int n = arr.length;
              for (int i = 0; i < n-1; i++) {
                  int minIdx = i;
                  for (int j = i+1; j < n; j++) if (arr[j] < arr[minIdx]) minIdx = j;
                  int tmp = arr[i]; arr[i] = arr[minIdx]; arr[minIdx] = tmp;
              }
          }
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          String strategy = sc.next();
          int[] arr = new int[n];
          for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

          Sorter sorter = strategy.equals("bubble") ? new BubbleSorter() : new SelectionSorter();
          sorter.sort(arr);

          StringBuilder sb = new StringBuilder();
          for (int i = 0; i < n; i++) {
              if (i > 0) sb.append(' ');
              sb.append(arr[i]);
          }
          System.out.println(sb);
      }
  }
