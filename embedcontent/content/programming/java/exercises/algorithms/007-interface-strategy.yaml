id: java-algorithms-007
title: "Strategy Pattern with Interfaces"
difficulty: 3
tags: [design-patterns, strategy, interfaces, oop]
description: |
  Implement the Strategy design pattern for sorting.
  Define a Sorter interface with sort(int[] arr) method.
  Implement: BubbleSorter, SelectionSorter, and use them interchangeably.

  Read N numbers and a strategy name ("bubble" or "selection"), sort them,
  print sorted array space-separated.

  Example:
    5 bubble
    5 3 1 4 2
    → 1 2 3 4 5
starter_code: |
  import java.util.*;

  public class Main {
      interface Sorter {
          void sort(int[] arr);
      }

      static class BubbleSorter implements Sorter {
          public void sort(int[] arr) {
              // implement bubble sort
          }
      }

      static class SelectionSorter implements Sorter {
          public void sort(int[] arr) {
              // implement selection sort
          }
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          String strategy = sc.next();
          int[] arr = new int[n];
          for (int i = 0; i < n; i++) arr[i] = sc.nextInt();

          Sorter sorter = strategy.equals("bubble") ? new BubbleSorter() : new SelectionSorter();
          sorter.sort(arr);

          StringBuilder sb = new StringBuilder();
          for (int i = 0; i < n; i++) {
              if (i > 0) sb.append(' ');
              sb.append(arr[i]);
          }
          System.out.println(sb);
      }
  }
test_cases:
  - input: "5 bubble\n5 3 1 4 2\n"
    expected_output: "1 2 3 4 5\n"
    time_limit_ms: 10000
