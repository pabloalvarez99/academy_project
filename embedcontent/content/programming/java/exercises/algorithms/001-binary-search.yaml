id: java-algorithms-001
title: "Binary Search"
difficulty: 2
tags: [algorithms, binary-search, arrays]
description: |
  Implement binary search on a sorted array. Given N integers (sorted ascending)
  and a target T, print the index of T, or -1 if not found.

  Input format:
    Line 1: N
    Line 2: space-separated sorted integers
    Line 3: target T

  Examples:
    [1, 3, 5, 7, 9], T=5 → 2
    [1, 3, 5, 7, 9], T=6 → -1
starter_code: |
  import java.util.Scanner;

  public class Main {
      static int binarySearch(int[] arr, int target) {
          // implement binary search
          return -1;
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          int[] arr = new int[n];
          for (int i = 0; i < n; i++) arr[i] = sc.nextInt();
          int target = sc.nextInt();
          System.out.println(binarySearch(arr, target));
      }
  }
