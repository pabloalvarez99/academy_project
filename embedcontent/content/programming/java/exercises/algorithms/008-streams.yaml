id: java-algorithms-008
title: "Java Streams API"
difficulty: 3
tags: [streams, functional, lambda, collectors, java]
description: |
  Practice Java Streams for declarative data processing.

  Read a command and a list of integers, apply the corresponding stream pipeline:

  Commands:
    filter N    → integers > N, sorted ascending
    map         → square each integer, print sorted ascending
    reduce      → sum all integers
    groupeven   → count even and odd: "even=E odd=O"
    top3        → top 3 largest values, descending

  Input: "command [N] num1 num2 ..."
starter_code: |
  import java.util.*;
  import java.util.stream.*;

  public class Main {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          String cmd = sc.next();
          int threshold = 0;
          if (cmd.equals("filter")) threshold = sc.nextInt();

          List<Integer> nums = new ArrayList<>();
          while (sc.hasNextInt()) nums.add(sc.nextInt());

          switch (cmd) {
              case "filter" -> {
                  int t = threshold;
                  nums.stream()
                      .filter(x -> x > t)
                      .sorted()
                      .forEach(System.out::println);
              }
              case "map" ->
                  nums.stream()
                      .map(x -> x * x)
                      .sorted()
                      .forEach(System.out::println);
              case "reduce" ->
                  System.out.println(nums.stream().mapToInt(Integer::intValue).sum());
              case "groupeven" -> {
                  Map<Boolean, Long> groups = nums.stream()
                      .collect(Collectors.partitioningBy(x -> x % 2 == 0, Collectors.counting()));
                  System.out.println("even=" + groups.get(true) + " odd=" + groups.get(false));
              }
              case "top3" ->
                  nums.stream()
                      .sorted(Comparator.reverseOrder())
                      .limit(3)
                      .forEach(System.out::println);
          }
      }
  }
test_cases:
  - input: "filter 3 1 5 2 8 3 7\n"
    expected_output: "5\n7\n8\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "map 1 2 3 4\n"
    expected_output: "1\n4\n9\n16\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "reduce 10 20 30\n"
    expected_output: "60\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "groupeven 1 2 3 4 5 6\n"
    expected_output: "even=3 odd=3\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
  - input: "top3 5 1 9 3 7 2\n"
    expected_output: "9\n7\n5\n"
    time_limit_ms: 5000
    memory_limit_kb: 131072
hints:
  - "stream().filter(predicate).sorted() chains operations lazily"
  - "mapToInt().sum() is more efficient than reduce for int summation"
  - "Collectors.partitioningBy splits into true/false map"
  - "sorted(Comparator.reverseOrder()).limit(3) for top-N"
  - "Switch expressions (Java 14+) with -> avoid fall-through"
