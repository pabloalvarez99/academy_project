hints:
  - "Loop over chars, skip spaces, use freq.merge(c, 1, Integer::sum)"
  - "Sort: List<Map.Entry<>> sorted by -value then key (char comparison)"
  - "freq.entrySet().stream().sorted(Comparator.comparingInt((Map.Entry<Character,Integer> e) -> -e.getValue()).thenComparingInt(e -> e.getKey()))"
solution: |
  import java.util.*;

  public class Main {
      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          String line = sc.nextLine();
          Map<Character, Integer> freq = new LinkedHashMap<>();
          for (char c : line.toCharArray()) {
              if (c != ' ') freq.merge(c, 1, Integer::sum);
          }
          freq.entrySet().stream()
              .sorted(Comparator.comparingInt((Map.Entry<Character, Integer> e) -> -e.getValue())
                  .thenComparingInt(e -> e.getKey()))
              .forEach(e -> System.out.println(e.getKey() + " " + e.getValue()));
      }
  }
