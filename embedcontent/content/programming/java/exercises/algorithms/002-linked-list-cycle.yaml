hints:
  - "Use two pointers: slow moves 1 step, fast moves 2 steps"
  - "If fast or fast.next is null → no cycle (returns false)"
  - "If slow == fast → cycle detected (returns true)"
  - "They will always meet inside the cycle if one exists"
solution: |
  import java.util.Scanner;

  public class Main {
      static class ListNode {
          int val;
          ListNode next;
          ListNode(int v) { val = v; }
      }

      static boolean hasCycle(ListNode head) {
          ListNode slow = head, fast = head;
          while (fast != null && fast.next != null) {
              slow = slow.next;
              fast = fast.next.next;
              if (slow == fast) return true;
          }
          return false;
      }

      public static void main(String[] args) {
          Scanner sc = new Scanner(System.in);
          int n = sc.nextInt();
          ListNode[] nodes = new ListNode[n];
          for (int i = 0; i < n; i++) nodes[i] = new ListNode(sc.nextInt());
          for (int i = 0; i < n - 1; i++) nodes[i].next = nodes[i + 1];
          int cyclePos = sc.nextInt();
          if (cyclePos >= 0) nodes[n - 1].next = nodes[cyclePos];
          System.out.println(hasCycle(nodes[0]));
      }
  }
