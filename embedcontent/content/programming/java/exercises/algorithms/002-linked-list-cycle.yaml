description: |
  Detect if a linked list has a cycle using Floyd's tortoise-and-hare algorithm.
  Given a sequence of integers and a cycle position (-1 = no cycle), print "true" or "false".

  Input format:
    Line 1: N values
    Line 2: space-separated integers
    Line 3: cycle_pos (tail.next points to node at this index, or -1)

  Examples:
    [3,2,0,-4], cycle_pos=1 → true (tail points to index 1)
    [1,2],      cycle_pos=0 → true
    [1],        cycle_pos=-1 → false
