id: cpp-basics-003
title: "Sum of a Vector"
difficulty: 2
tags: [vector, stl, loops, accumulate]
description: |
  Write a C++ program that reads an integer N, then N integers, and prints their sum.

  Example:
    Input:  4\n1 2 3 4
    Output: 10
starter_code: |
  #include <iostream>
  #include <vector>

  int main() {
      int n;
      std::cin >> n;
      std::vector<int> v(n);
      // read n numbers into v, then print their sum
      return 0;
  }
test_cases:
  - input: "4\n1 2 3 4\n"
    expected_output: "10\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "3\n10 20 30\n"
    expected_output: "60\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
  - input: "1\n42\n"
    expected_output: "42\n"
    time_limit_ms: 10000
    memory_limit_kb: 131072
hints:
  - "Use a range-based for loop: for (int x : v)"
  - "Or use std::accumulate from <numeric>"
solution: |
  #include <iostream>
  #include <vector>
  #include <numeric>

  int main() {
      int n;
      std::cin >> n;
      std::vector<int> v(n);
      for (int i = 0; i < n; i++) std::cin >> v[i];
      std::cout << std::accumulate(v.begin(), v.end(), 0) << std::endl;
      return 0;
  }
