id: cpp-basics-007
title: "std::map Grouping"
difficulty: 2
tags: [map, grouping, stl, cpp]
description: |
  Read N students with name and grade. Group them by grade and print each grade
  with its students sorted alphabetically, grades sorted ascending.

  Input:
    Line 1: N
    Next N lines: name grade

  Example:
    Input: 5 students
      Alice A
      Bob B
      Carol A
      Dave B
      Eve A
    Output:
      A: Alice Carol Eve
      B: Bob Dave
starter_code: |
  #include <iostream>
  #include <map>
  #include <vector>
  #include <algorithm>
  #include <string>
  using namespace std;

  int main() {
      int n;
      cin >> n;
      map<string, vector<string>> groups;
      // read students and group by grade
      // print sorted
      return 0;
  }
test_cases:
  - input: "5\nAlice A\nBob B\nCarol A\nDave B\nEve A\n"
    expected_output: "A: Alice Carol Eve\nB: Bob Dave\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "3\nZara C\nAlex A\nMia A\n"
    expected_output: "A: Alex Mia\nC: Zara\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
hints:
  - "map<string, vector<string>> groups; — map sorts keys automatically"
  - "groups[grade].push_back(name) for each student"
  - "Sort each vector after grouping: sort(groups[grade].begin(), groups[grade].end())"
  - "Iterate: for (auto &[grade, names] : groups) { ... }"
solution: |
  #include <iostream>
  #include <map>
  #include <vector>
  #include <algorithm>
  #include <string>
  using namespace std;

  int main() {
      int n;
      cin >> n;
      map<string, vector<string>> groups;
      for (int i = 0; i < n; i++) {
          string name, grade;
          cin >> name >> grade;
          groups[grade].push_back(name);
      }
      for (auto &[grade, names] : groups) {
          sort(names.begin(), names.end());
          cout << grade << ":";
          for (auto &name : names) cout << " " << name;
          cout << "\n";
      }
      return 0;
  }
