id: rust-basics-001
title: "Hello, World!"
difficulty: 1
tags: [basics, println, macros]
description: |
  Write a Rust program that prints exactly:
  Hello, World!
starter_code: |
  fn main() {
      // your code here
  }
test_cases:
  - input: ""
    expected_output: "Hello, World!\n"
    time_limit_ms: 15000
    memory_limit_kb: 131072
hints:
  - "Use the println! macro"
  - "println!(\"Hello, World!\") adds a newline automatically"
solution: |
  fn main() {
      println!("Hello, World!");
  }
