id: rust-basics-008
title: "Iterators and Functional Style"
difficulty: 3
tags: [iterators, map, filter, fold, rust]
description: |
  Practice Rust's powerful iterator combinators.
  Read N integers and:
  1. Print the sum of squares of all even numbers
  2. Print the count of numbers > 10
  3. Print all numbers multiplied by 3, space-separated, only those originally odd

  Input:
    Line 1: N
    Line 2: space-separated integers

  Example:
    Input: 6 / 1 2 3 4 5 12
    Output:
      20        (2²+4²=4+16=20)
      1         (only 12 > 10)
      3 9 15    (1*3, 3*3, 5*3 — odd originals)
starter_code: |
  use std::io::{self, BufRead};

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines();
      let n: usize = lines.next().unwrap().unwrap().trim().parse().unwrap();
      let nums: Vec<i64> = lines.next().unwrap().unwrap()
          .split_whitespace()
          .map(|x| x.parse().unwrap())
          .collect();

      // 1. Sum of squares of even numbers
      let sum_sq_even: i64 = 0; // TODO

      // 2. Count numbers > 10
      let count_gt10: usize = 0; // TODO

      // 3. Odd numbers * 3, space-separated
      let odd_tripled: Vec<String> = vec![]; // TODO

      println!("{}", sum_sq_even);
      println!("{}", count_gt10);
      println!("{}", odd_tripled.join(" "));
  }
test_cases:
  - input: "6\n1 2 3 4 5 12\n"
    expected_output: "20\n1\n3 9 15\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "4\n2 4 6 8\n"
    expected_output: "120\n0\n\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
  - input: "3\n11 13 15\n"
    expected_output: "0\n3\n33 39 45\n"
    time_limit_ms: 10000
    memory_limit_kb: 65536
hints:
  - "sum_sq_even: nums.iter().filter(|&&x| x % 2 == 0).map(|&x| x*x).sum()"
  - "count_gt10: nums.iter().filter(|&&x| x > 10).count()"
  - "odd_tripled: nums.iter().filter(|&&x| x % 2 != 0).map(|&x| (x*3).to_string()).collect()"
  - "Iterator chains are lazy — evaluation happens at collect()/sum()/count()"
solution: |
  use std::io::{self, BufRead};

  fn main() {
      let stdin = io::stdin();
      let mut lines = stdin.lock().lines();
      let _n: usize = lines.next().unwrap().unwrap().trim().parse().unwrap();
      let nums: Vec<i64> = lines.next().unwrap().unwrap()
          .split_whitespace()
          .map(|x| x.parse().unwrap())
          .collect();

      let sum_sq_even: i64 = nums.iter()
          .filter(|&&x| x % 2 == 0)
          .map(|&x| x * x)
          .sum();

      let count_gt10 = nums.iter().filter(|&&x| x > 10).count();

      let odd_tripled: Vec<String> = nums.iter()
          .filter(|&&x| x % 2 != 0)
          .map(|&x| (x * 3).to_string())
          .collect();

      println!("{}", sum_sq_even);
      println!("{}", count_gt10);
      println!("{}", odd_tripled.join(" "));
  }
