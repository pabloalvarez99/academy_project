hints:
  - "Replace todo!() with actual implementations"
  - "area: self.width * self.height"
  - "perimeter: 2 * (self.width + self.height)"
  - "is_square: self.width == self.height"
solution: |
  use std::io;

  struct Rectangle {
      width: u32,
      height: u32,
  }

  impl Rectangle {
      fn area(&self) -> u32 {
          self.width * self.height
      }

      fn perimeter(&self) -> u32 {
          2 * (self.width + self.height)
      }

      fn is_square(&self) -> bool {
          self.width == self.height
      }
  }

  fn main() {
      let mut input = String::new();
      io::stdin().read_line(&mut input).unwrap();
      let parts: Vec<u32> = input.trim().split_whitespace()
          .map(|x| x.parse().unwrap())
          .collect();
      let rect = Rectangle { width: parts[0], height: parts[1] };
      println!("{}", rect.area());
      println!("{}", rect.perimeter());
      println!("{}", rect.is_square());
  }
