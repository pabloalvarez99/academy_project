description: |
  Define a Rectangle struct with width and height fields.
  Implement methods:
    - area() → returns width * height
    - perimeter() → returns 2*(width+height)
    - is_square() → returns true if width == height

  Read two integers (width height) and print area, perimeter, and is_square on separate lines.

  Example:
    Input: 4 6
    Output:
      24
      20
      false
